const R=[
{id:1,ing:"caldi",name:"Porridge Classico Energetico",emoji:"🥣",diff:1,time:8,serv:1,kcal:410,p:16,c:58,f:13,goal:"energia",goalTxt:"Colazione calda — energia stabile per la mattinata",items:[{i:"Fiocchi d'avena",q:"50g",s:"Fiocchi farro"},{i:"Latte parzialmente scremato",q:"200ml",s:"Bevanda vegetale"},{i:"Banana",q:"1 media",s:null},{i:"Mandorle",q:"10g",s:"Noci"},{i:"Cannella",q:"q.b.",s:null}],steps:["Porta latte e avena a bollore in un pentolino.","Cuoci a fuoco basso 4-5 min mescolando fino a consistenza cremosa.","Versa in ciotola. Aggiungi banana a fette, mandorle spezzate e cannella."],tips:"Il porridge è la colazione perfetta nei giorni di allenamento. Carboidrati complessi che rilasciano energia per ore."},
{id:2,ing:"yogurt",name:"Yogurt Greco con Granola e Frutta",emoji:"🫐",diff:1,time:3,serv:1,kcal:360,p:22,c:42,f:9,goal:"energia",goalTxt:"3 minuti — yogurt greco e frutta fresca",items:[{i:"Yogurt greco 0%",q:"200g",s:null},{i:"Granola",q:"30g",s:null},{i:"Frutta fresca",q:"100g",s:"Frutti di bosco"},{i:"Miele",q:"10g",s:null}],steps:["Versa lo yogurt in una bowl.","Aggiungi granola, frutta a pezzi e miele a filo.","Mescola leggermente o lascia a strati."],tips:"Lo yogurt greco ha il doppio delle proteine di uno normale. Scegli granola senza zuccheri aggiunti per macro migliori."},
{id:3,ing:"salate",name:"Pane Integrale con Ricotta e Marmellata",emoji:"🍞",diff:1,time:5,serv:1,kcal:340,p:15,c:50,f:4,goal:"energia",goalTxt:"Veloce e bilanciata — comfort italiano",items:[{i:"Pane integrale",q:"70g",s:"Pane ai cereali"},{i:"Ricotta magra",q:"80g",s:"Fiocchi di latte"},{i:"Marmellata",q:"15g",s:"Miele"}],steps:["Tosta il pane.","Spalma la ricotta abbondante.","Aggiungi la marmellata sopra."],tips:"Marmellata artigianale senza zuccheri aggiunti = scelta migliore. La ricotta dà 11g di proteine senza appesantire."},
{id:4,ing:"forno",name:"Pancake Fit all'Avena",emoji:"🥞",diff:1,time:10,serv:1,kcal:320,p:16,c:36,f:10,goal:"energia",goalTxt:"Pancake fatti in casa — bilanciati",items:[{i:"Farina d'avena",q:"50g",s:"Fiocchi avena frullati"},{i:"Uovo",q:"1",s:null},{i:"Latte",q:"100ml",s:null},{i:"Miele",q:"10g",s:"Dolcificante"}],steps:["Mescola farina d'avena, uovo, latte e miele fino a pastella liscia.","Padella antiaderente a fuoco medio. Versa ~60ml per pancake.","Cuoci 2-3 min per lato. Servi con frutta o yogurt."],tips:"Aggiungi proteine in polvere se vuoi più proteine. Puoi raddoppiare le dosi e congelare per i giorni di corsa."},
{id:5,ing:"forno",name:"Ciambellone Fit alle Mele",emoji:"🍎",diff:2,time:30,serv:8,kcal:185,p:14,c:22,f:6,goal:"energia",goalTxt:"8 fette — colazione per 4 giorni",items:[{i:"Fiocchi d'avena",q:"150g",s:null},{i:"Mele",q:"2 (300g)",s:"Pere"},{i:"Uova",q:"2",s:null},{i:"Yogurt greco 0%",q:"150g",s:null},{i:PP,q:"40g",s:null},{i:"Lievito",q:"6g",s:null},{i:"Cannella",q:"3g",s:null},{i:"Miele",q:"30g",s:null}],steps:["Forno 170°C. Fodera stampo ciambella 24 cm con olio spray.","Frulla avena in farina. Grattugia 1 mela, taglia l'altra a fettine.","Mescola farina avena, uova, yogurt, proteine, miele, cannella e mela grattugiata.","Versa nello stampo. Fettine di mela sopra. Inforna 25-28 min.","Stecchino pulito = pronto. Taglia in 8 fette."],tips:"Dolce della tradizione italiana in versione fit. 4 giorni in frigo, congelabile a fette. Zero zucchero raffinato."},
{id:6,ing:"yogurt",name:"Overnight Oats Classici",emoji:"🌙",diff:1,time:5,serv:1,kcal:420,p:30,c:52,f:12,goal:"energia",goalTxt:"Prepara la sera, mangia al mattino",items:[{i:"Fiocchi d'avena",q:"60g",s:"Fiocchi farro"},{i:"Yogurt greco 0%",q:"150g",s:null},{i:"Latte scremato",q:"80ml",s:null},{i:"Semi di chia",q:"10g",s:"Semi lino"},{i:"Miele millefiori",q:"10g",s:null},{i:"Frutti di bosco",q:"80g",s:null},{i:"Mandorle lamelle",q:"10g",s:null}],steps:["In un barattolo: avena, yogurt, latte, chia e miele. Agita bene.","Frigo per almeno 6 ore (ideale tutta la notte).","Al mattino aggiungi frutti di bosco e mandorle."],tips:"Prepara 5 barattoli la domenica = colazione per tutta la settimana. 5 giorni in frigo."},
{id:7,ing:"salate",name:"Uova Strapazzate Cremose",emoji:"🍳",diff:1,time:8,serv:1,kcal:310,p:34,c:4,f:18,goal:"definizione",goalTxt:"Ultra low-carb — re della definizione",items:[{i:"Uova intere",q:"2",s:null},{i:"Albumi",q:"120g (4)",s:null},{i:"Latte scremato",q:"20ml",s:null},{i:"Erba cipollina",q:"5g",s:"Prezzemolo"},{i:"Sale e pepe",q:"q.b.",s:null},{i:"Olio EVO",q:"5ml",s:null}],steps:["Sbatti uova, albumi e latte con forchetta. Pizzico di sale e pepe.","Olio EVO in padella a fuoco MEDIO-BASSO.","Versa uova. Aspetta 20 sec. Con spatola spingi dal bordo al centro ogni 15-20 sec.","Togli dal fuoco quando ANCORA leggermente umide. Cospargi erba cipollina."],tips:"Fuoco BASSO e togliere PRIMA che sembrino pronte = cremose. Servile su pane casereccio tostato con pomodorini."},
{id:8,ing:"salate",name:"Toast Salmone & Ricotta",emoji:"🐟",diff:1,time:5,serv:1,kcal:360,p:28,c:28,f:16,goal:"energia",goalTxt:"Omega-3 a colazione — elegante",items:[{i:"Pane di segale",q:"2 fette",s:"Pane integrale"},{i:"Salmone affumicato",q:"60g",s:"Trota"},{i:"Ricotta",q:"50g",s:null},{i:"Capperi",q:"8g",s:null},{i:"Cetriolo",q:"30g",s:null},{i:"Limone",q:"spruzzata",s:null}],steps:["Tosta pane. Spalma ricotta.","Adagia salmone, cetriolo a fettine e capperi.","Spruzzata di limone e pepe nero."],tips:"60g salmone = 13g proteine + omega-3. La ricotta al posto del cream cheese è più italiana e ha più proteine."},

{id:9,ing:"forno",name:"Pancake Proteici Albume e Avena",emoji:"🥞",diff:1,time:10,serv:1,kcal:365,p:39,c:43,f:4,goal:"massa",goalTxt:"39g proteine — la colazione post-corsa per chi cresce",items:[{i:"Farina d'avena",q:"40g",s:"Fiocchi d'avena frullati"},{i:"Albume",q:"150g (5)",s:null},{i:PP,q:"20g",s:null},{i:"Banana matura",q:"60g (½)",s:null},{i:"Lievito per dolci",q:"3g",s:null},{i:"Cannella",q:"q.b.",s:null}],steps:["Frulla insieme farina d'avena, albume, proteine, banana e lievito fino a pastella liscia.","Padella antiaderente a fuoco medio con olio spray. Versa ~60ml per pancake.","Cuoci 2 min, gira alle bollicine e cuoci 1,5 min sull'altro lato.","Otterrai 4-5 pancake. Servi con frutta fresca o miele a filo."],tips:"Versione proteica del pancake firmata Project Invictus. Banana ben matura = dolcezza naturale, zero zucchero aggiunto. Fonte: projectinvictus.it/colazione-proteica-dolce"},
{id:10,ing:"yogurt",name:"Frullato Latte Banana e Cacao",emoji:"🥤",diff:1,time:4,serv:1,kcal:360,p:30,c:47,f:7,goal:"recovery",goalTxt:"Frullato proteico cioccolatoso — perfetto post-corsa",items:[{i:"Latte parzialmente scremato",q:"250ml",s:"Bevanda di soia"},{i:"Banana",q:"1 grande (120g)",s:null},{i:"Cacao amaro",q:"8g",s:null},{i:PP+" vaniglia",q:"25g",s:null},{i:"Miele",q:"5g",s:null}],steps:["Sbuccia la banana e mettila nel frullatore.","Aggiungi latte, cacao amaro, proteine e miele.","Frulla 30-40 sec alla massima potenza. Bevi subito."],tips:"Quando la colazione coincide col post-workout, un frullato proteico è ideale. Il cacao amaro porta flavonoidi antinfiammatori. Fonte: projectinvictus.it/colazione-per-dimagrire"},
{id:11,ing:"yogurt",name:"Crema di Ricotta al Cacao su Pane",emoji:"🍫",diff:1,time:5,serv:1,kcal:435,p:20,c:48,f:19,goal:"energia",goalTxt:"Crema spalmabile naturale — golosità sana",items:[{i:"Ricotta vaccina",q:"150g",s:"Ricotta di pecora"},{i:"Cacao amaro",q:"10g",s:null},{i:"Miele",q:"15g",s:null},{i:"Pane integrale",q:"60g (2 fette)",s:"Pane ai cereali"}],steps:["Metti la ricotta in una ciotola.","Aggiungi cacao amaro e miele. Mescola energicamente fino a crema liscia e cioccolatosa.","Tosta il pane integrale e spalma la crema."],tips:"La ricotta è il latticino più ricco di proteine: 11g per 100g. Diventa una crema spalmabile sana e naturale, alternativa proteica alla Nutella. Fonte: projectinvictus.it/colazione-proteica-dolce"},
{id:12,ing:"salate",name:"Toast Integrale Bresaola e Avocado",emoji:"🥑",diff:1,time:5,serv:1,kcal:330,p:23,c:39,f:11,goal:"definizione",goalTxt:"Bresaola e avocado — combo proteica e leggera",items:[{i:"Pane integrale",q:"70g (2-3 fette)",s:"Pane di segale"},{i:"Bresaola della Valtellina",q:"50g",s:"Fesa di tacchino"},{i:"Avocado",q:"60g (½ piccolo)",s:null},{i:"Limone",q:"½",s:null},{i:"Pepe nero",q:"q.b.",s:null}],steps:["Tosta il pane.","Schiaccia l'avocado con qualche goccia di limone e pepe.","Spalma sull'avocado le fette di pane, copri con bresaola."],tips:"La bresaola è il salume più magro in assoluto (2% grassi). L'avocado dà grassi buoni che danno energia stabile. Fonte: post.almaverdebio.it/lifestyle/colazione-proteica"},
{id:13,ing:"salate",name:"Uova Strapazzate con Spinaci e Parmigiano",emoji:"🍳",diff:1,time:10,serv:1,kcal:350,p:28,c:24,f:17,goal:"massa",goalTxt:"Salata, calda, completa — la colazione del runner",items:[{i:"Uova intere",q:"2",s:null},{i:"Albume",q:"60g (2)",s:null},{i:"Spinaci freschi",q:"80g",s:"Bietola"},{i:"Parmigiano",q:"10g",s:"Pecorino"},{i:"Olio EVO",q:"5ml",s:null},{i:"Pane integrale",q:"40g (1 fetta)",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["In una ciotola sbatti uova intere e albumi con sale e pepe.","Padella antiaderente con olio EVO. Salta gli spinaci 2 min finché appassiscono.","Versa il composto di uova sopra gli spinaci. Cuoci a fuoco basso strapazzando con la spatola.","Spegni quando sono ancora leggermente umide. Spolvera parmigiano. Servi con pane tostato."],tips:"Le uova sono proteine di alto valore biologico — un uovo medio dà 6g di proteine. Aggiungere albume aumenta la quota senza grassi extra. Fonte: watt.it/colazione-proteica"},
{id:14,ing:"salate",name:"Fiocchi di Latte con Pomodorini su Pane di Segale",emoji:"🍅",diff:1,time:5,serv:1,kcal:360,p:24,c:36,f:14,goal:"definizione",goalTxt:"5 minuti — leggera, proteica, mediterranea",items:[{i:"Fiocchi di latte",q:"150g",s:"Ricotta"},{i:"Pomodorini",q:"80g",s:null},{i:"Pane di segale",q:"60g (2 fette)",s:"Pane integrale"},{i:"Olio EVO",q:"5ml",s:null},{i:"Basilico",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Tosta il pane di segale.","Spalma i fiocchi di latte abbondanti su entrambe le fette.","Taglia i pomodorini a metà, distribuiscili sopra.","Filo di olio EVO, pizzico di sale, pepe e basilico fresco."],tips:"I fiocchi di latte (cottage cheese) sono ricchi di caseina, proteina a lento rilascio. Perfetti per il senso di sazietà prolungato. Fonte: watt.it/colazione-proteica"},
{id:15,ing:"salate",name:"Toast Salmone, Uova e Avocado",emoji:"🐟",diff:2,time:10,serv:1,kcal:380,p:23,c:39,f:16,goal:"recovery",goalTxt:"Omega-3 + proteine alto valore biologico",items:[{i:"Pane integrale",q:"70g (2 fette)",s:"Pane di segale"},{i:"Salmone affumicato",q:"50g",s:"Trota affumicata"},{i:"Uovo intero",q:"1 (50g)",s:null},{i:"Avocado",q:"50g (¼)",s:null},{i:"Limone",q:"½",s:null},{i:"Aceto bianco",q:"q.b.",s:null}],steps:["Porta a bollore l'acqua con un cucchiaio d'aceto. Crea un vortice con un cucchiaio e versa l'uovo al centro: 2-3 min.","Tosta il pane. Schiaccia l'avocado con limone, sale e pepe.","Spalma avocado, copri con salmone. Adagia l'uovo in camicia sopra. Pepe nero a finire."],tips:"Salmone + uova + avocado = la trinità della colazione proteica salata. Omega-3 dal salmone, proteine complete dall'uovo, grassi buoni dall'avocado. Fonte: post.almaverdebio.it/lifestyle/colazione-proteica"},
{id:16,ing:"salate",name:"Frittata di Albumi e Farina di Ceci",emoji:"🧆",diff:1,time:10,serv:1,kcal:295,p:36,c:19,f:8,goal:"definizione",goalTxt:"36g proteine, low-carb, low-fat — re della definizione",items:[{i:"Albumi",q:"180g (6)",s:null},{i:"Farina di ceci",q:"30g",s:null},{i:"Bresaola",q:"30g",s:"Fesa tacchino"},{i:"Olio EVO",q:"5ml",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Versa gli albumi in una ciotola, aggiungi lentamente la farina di ceci sbattendo per evitare grumi. Sale.","Scalda l'olio in padella antiaderente a fuoco medio.","Versa il composto. Cuoci 4-5 min finché il fondo si dora. Gira con cura.","Cuoci altri 2 min. Servi con bresaola sopra come accompagnamento."],tips:"Ricetta di una dietista nutrizionista italiana. La farina di ceci fa da addensante e aggiunge fibre e proteine vegetali. Ipoglucidica, ipolipidica, super proteica. Fonte: dietistavalentinarossi.it/colazioni-salate-5-idee-sane-e-sfiziose"},
{id:17,ing:"yogurt",name:"Overnight Oats Cioccolato e Lamponi",emoji:"🫐",diff:1,time:5,serv:1,kcal:440,p:29,c:64,f:8,goal:"energia",goalTxt:"Prepara la sera — colazione golosa e bilanciata",items:[{i:"Fiocchi d'avena",q:"50g",s:null},{i:"Yogurt greco 0%",q:"150g",s:null},{i:"Latte scremato",q:"80ml",s:null},{i:"Lamponi",q:"100g (freschi o surgelati)",s:"Frutti di bosco misti"},{i:"Cacao amaro",q:"5g",s:null},{i:"Miele",q:"10g",s:null},{i:"Cioccolato fondente 85%",q:"5g",s:null}],steps:["In un barattolo unisci avena, yogurt greco, latte e cacao amaro. Mescola bene.","Aggiungi il miele e mescola ancora. Chiudi il barattolo.","Frigo per almeno 6 ore (meglio tutta la notte).","Al mattino aggiungi i lamponi e scaglie di cioccolato fondente sopra."],tips:"L'overnight oats è il porridge senza cottura: l'avena assorbe il liquido di notte. I lamponi danno polifenoli antinfiammatori utili al runner. Fonte: projectinvictus.it/colazione-proteica-dolce + tradizione overnight"},
{id:18,ing:"forno",name:"Frittata Dolce di Albumi con Mirtilli e Banana",emoji:"🫐",diff:1,time:10,serv:1,kcal:260,p:24,c:38,f:2,goal:"definizione",goalTxt:"Dolce ma ultra-magra — 24g proteine, solo 2g grassi",items:[{i:"Albumi",q:"180g (6)",s:null},{i:"Mirtilli",q:"80g",s:"Frutti di bosco"},{i:"Banana matura",q:"50g (½)",s:null},{i:"Fiocchi d'avena",q:"20g",s:null},{i:"Lievito per dolci",q:"3g",s:null},{i:"Cannella",q:"q.b.",s:null}],steps:["Schiaccia la banana con la forchetta. Aggiungi albumi, avena, lievito e cannella. Mescola bene.","Padella antiaderente a fuoco basso con olio spray.","Versa il composto e distribuisci i mirtilli sopra.","Coperchio e cuoci 4-5 min finché il fondo si dora. Gira con cura e cuoci altri 2 min."],tips:"Versione fit per il bodybuilder secondo +Watt. Solo 2g di grassi grazie all'uso esclusivo di albumi. Dolcezza naturale dalla banana matura. Fonte: watt.it/colazione-proteica"},

{id:101,ing:"medi",name:"Yogurt Greco e Mandorle",emoji:"🫐",diff:1,time:3,serv:1,kcal:220,p:17,c:12,f:11,timing:"45-60 min prima",goalTxt:"Proteico e leggero — pre-workout classico",items:[{i:"Yogurt greco",q:"170g",s:null},{i:"Mandorle",q:"15g",s:"Noci"},{i:"Miele",q:"5g",s:null}],steps:["Versa lo yogurt in una ciotola.","Aggiungi le mandorle spezzate e il miele.","Mescola oppure consuma a strati."],tips:"Le mandorle siciliane sono tra le migliori. Le proteine dello yogurt + grassi delle mandorle danno energia stabile per 1-2 ore."},
{id:102,ing:"pasto",name:"Toast con Hummus e Tacchino",emoji:"🥪",diff:1,time:5,serv:1,kcal:270,p:20,c:30,f:8,timing:"90 min prima",goalTxt:"Pasto leggero e completo — anti-catabolismo",items:[{i:"Pane ai cereali",q:"60g",s:"Pane integrale"},{i:"Fesa di tacchino",q:"60g",s:"Bresaola"},{i:"Hummus",q:"30g",s:"Ricotta"},{i:"Cetriolo o zucchine grigliate",q:"q.b.",s:null}],steps:["Tosta il pane.","Spalma l'hummus come base.","Aggiungi tacchino e verdure. Chiudi o lascia aperto."],tips:"L'hummus dà proteine vegetali extra dai ceci. Combinato col tacchino = profilo aminoacidico completo."},

{id:107,ing:"rapidi",name:"Fette Biscottate con Miele",emoji:"🍞",diff:1,time:2,serv:1,kcal:170,p:4,c:37,f:2,timing:"20-30 min prima",goalTxt:"Il classico del runner italiano — energia rapida",items:[{i:"Fette biscottate",q:"3 (30g)",s:"Pane tostato 40g"},{i:"Miele millefiori",q:"15g",s:"Marmellata"}],steps:["Disponi le fette biscottate sul piatto.","Spalma un velo di miele su ciascuna.","Consuma 20-30 minuti prima della corsa."],tips:"Lo spuntino pre-corsa più amato dai runner italiani. Niente fibre, niente grassi che rallentino lo stomaco — solo carboidrati pronti da bruciare. Fonte: runnersbergamo.it/spuntino-pre-allenamento + healthcoaching.it"},
{id:108,ing:"rapidi",name:"Crackers con Marmellata e Mandorle",emoji:"🍪",diff:1,time:3,serv:1,kcal:255,p:6,c:39,f:8,timing:"30-45 min prima",goalTxt:"Carb rapidi + un tocco di grassi buoni",items:[{i:"Crackers non salati",q:"40g",s:"Fette biscottate"},{i:"Marmellata di frutta",q:"15g",s:"Miele"},{i:"Mandorle",q:"8g (5-6 pezzi)",s:"Anacardi"}],steps:["Spalma la marmellata sui crackers.","Spezzetta le mandorle e distribuiscile sopra.","Consuma 30-45 min prima dell'allenamento."],tips:"I crackers si digeriscono in fretta perché poveri di fibre. Le mandorle in piccola quantità danno energia stabile senza appesantire. Fonte: runritual.com/cosa-mangiare-prima-di-allenarsi + greenstyle.it"},
{id:109,ing:"rapidi",name:"Datteri e Mandorle",emoji:"🌰",diff:1,time:1,serv:1,kcal:210,p:4,c:38,f:5,timing:"20-30 min prima",goalTxt:"Zuccheri naturali — il pre-corsa più semplice del mondo",items:[{i:"Datteri secchi",q:"3 medi (60g)",s:"Fichi secchi"},{i:"Mandorle",q:"10g",s:"Noci"}],steps:["Apri i datteri e rimuovi il nocciolo.","Mangia accompagnando con le mandorle.","Bevi un bicchiere d'acqua."],tips:"I datteri sono carb naturali ad assorbimento medio-rapido, ricchi di potassio. Combo classica usata dai runner di endurance. Si portano ovunque, zero preparazione. Fonte: runritual.com/cosa-mangiare-prima-di-allenarsi"},
{id:110,ing:"medi",name:"Yogurt Greco con Frutta Secca",emoji:"🥣",diff:1,time:3,serv:1,kcal:265,p:19,c:11,f:16,timing:"45-60 min prima",goalTxt:"Proteico ma leggero — il classico del pomeriggio",items:[{i:"Yogurt greco 0%",q:"150g",s:null},{i:"Noci",q:"15g",s:"Nocciole"},{i:"Mandorle",q:"10g",s:null},{i:"Miele",q:"5g",s:null}],steps:["Versa lo yogurt greco in una ciotola.","Spezzetta noci e mandorle. Distribuisci sopra.","Filo di miele e mangia."],tips:"Lo spuntino consigliato dai professionisti del trail running per il pomeriggio prima della corsa. Lo yogurt greco dà proteine ad alto valore biologico, la frutta secca grassi buoni che evitano picchi glicemici. Fonte: channel.endu.net/running/cosa-mangiare-prima-di-una-corsa"},
{id:111,ing:"pasto",name:"Panino con Bresaola",emoji:"🥪",diff:1,time:3,serv:1,kcal:235,p:22,c:31,f:1,timing:"60-90 min prima",goalTxt:"Mini-pasto proteico — quasi zero grassi",items:[{i:"Pane bianco (rosetta o filone)",q:"60g",s:"Pane integrale"},{i:"Bresaola della Valtellina",q:"50g",s:"Fesa di tacchino"}],steps:["Apri il panino a metà.","Disponi le fette di bresaola dentro.","Chiudi e mangia. Bevi acqua."],tips:"Mini-pasto perfetto se ti alleni nel pomeriggio o sera. La bresaola è proteina pura (33g/100g, solo 2% grassi). Il pane bianco si digerisce più rapidamente dell'integrale, ideale prima della corsa. Fonte: channel.endu.net + healthcoaching.it"},
{id:112,ing:"medi",name:"Centrifugato Carote, Mela e Mandorle",emoji:"🥕",diff:1,time:5,serv:1,kcal:180,p:5,c:25,f:7,timing:"45-60 min prima",goalTxt:"Liquido + grassi buoni — vitamine pronte",items:[{i:"Carote",q:"150g (2 medie)",s:null},{i:"Mela",q:"100g (1 piccola)",s:"Pera"},{i:"Mandorle",q:"12g",s:"Noci"},{i:"Zenzero fresco",q:"1 fettina (opzionale)",s:null},{i:"Limone",q:"½",s:null}],steps:["Lava bene carote e mela. Pela le carote.","Centrifuga (o frulla) carote, mela e zenzero.","Aggiungi succo di limone. Bevi entro 5 min — mastica a parte le mandorle."],tips:"Liquido = digestione molto rapida. Le carote portano betacarotene utile al runner, la mela zuccheri naturali, le mandorle grassi buoni che evitano il calo glicemico. Fonte: healthcoaching.it/mag/running-cosa-mangiare-prima-dopo (adattato)"},

{id:206,ing:"pesce",name:"Tonno Riso e Pomodorini",emoji:"🐟",diff:1,time:8,serv:1,kcal:440,p:38,c:46,f:10,goal:"energia",goalTxt:"Piatto unico veloce — no-cook con riso pronto",items:[{i:"Tonno naturale",q:"160g (2 scatol.)",s:null},{i:"Riso basmati cotto",q:"150g",s:null},{i:"Pomodorini",q:"120g",s:null},{i:"Olive nere",q:"20g",s:null},{i:"Capperi",q:"8g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Basilico",q:"q.b.",s:null}],steps:["Sgocciola tonno bene. Pomodorini a quarti.","Riso freddo come base. Tonno sfaldato al centro.","Pomodorini, olive, capperi. Olio EVO, basilico e limone."],tips:"Con riso pronto = TOTALMENTE NO-COOK in 5 min. Tonno+olive+capperi = la triade mediterranea per eccellenza."},

{id:208,ing:"pasta",name:"Pasta Tonno e Pomodorini",emoji:"🍝",diff:1,time:14,serv:1,kcal:450,p:34,c:56,f:8,goal:"energia",goalTxt:"Classico italiano — veloce e proteico",items:[{i:"Pasta integrale",q:"80g",s:"Pasta normale"},{i:"Tonno naturale",q:"160g",s:null},{i:"Pomodorini",q:"150g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Capperi",q:"10g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Basilico",q:"q.b.",s:null}],steps:["Acqua a bollire. Olio+aglio schiacciato 1 min. Pomodorini a metà, schiacciati. 5 min.","Cuoci pasta al dente (-1 min dalla confezione).","Tonno sgocciolato+capperi nel sugo. 1 min. Togli aglio.","Pasta nel sugo con 2-3 cucchiai acqua cottura. Salta 1-2 min. Basilico."],tips:"Acqua di cottura = ingrediente segreto per la cremosità. Con pasta di legumi = 42g proteine."},

{id:210,ing:"pasta",name:"Avocado Bread con Uova",emoji:"🥑",diff:1,time:12,serv:1,kcal:420,p:26,c:32,f:22,goal:"energia",goalTxt:"Classico avocado toast — pranzo completo",items:[{i:"Pane casereccio",q:"2 fette (80g)",s:"Pane integrale"},{i:"Avocado",q:"½ (70g)",s:null},{i:"Uova",q:"2",s:"4 albumi"},{i:"Pomodorini",q:"100g",s:null},{i:"Semi misti",q:"10g",s:null},{i:"Peperoncino",q:"q.b.",s:null},{i:"Olio EVO",q:"5ml",s:null}],steps:["Tosta pane casereccio. Schiaccia avocado con limone, sale, pepe, peperoncino.","Condisci pomodorini con olio e origano.","Cuoci 2 uova al tegamino 3-4 min con coperchio.","Avocado sulle fette, pomodorini, uovo sopra. Semi e pepe."],tips:"MASSA: +50g salmone = 38g proteine. DEFINIZIONE: solo albumi = -10g grassi."},

{id:211,ing:"pasta",name:"Pasta Proteica con Verdure Grigliate",emoji:"🍝",diff:1,time:15,serv:1,kcal:415,p:26,c:47,f:14,goal:"definizione",goalTxt:"Pasta proteica + verdure colorate — 26g proteine",items:[{i:"Pasta proteica",q:"80g",s:"Pasta integrale + uovo sodo"},{i:"Zucchina",q:"80g",s:null},{i:"Peperone",q:"60g",s:null},{i:"Melanzana",q:"60g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Origano o timo",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Lava e taglia a fette zucchina, peperone e melanzana.","Griglia le verdure su piastra calda per 2-3 min per lato.","Cuoci la pasta proteica in acqua salata seguendo i tempi della confezione.","Scola e condisci con le verdure grigliate, olio EVO, sale, pepe e origano fresco. Servi caldo o tiepido."],tips:"La pasta proteica ha il 30% di proteine contro il 12% della pasta classica. Stesso piacere del piatto italiano, più proteine. Fonte: dmnutrition.it/primi-piatti-proteici"},
{id:212,ing:"pasta",name:"Pasta Cremosa Salmone e Yogurt Greco",emoji:"🐟",diff:2,time:18,serv:1,kcal:620,p:42,c:61,f:23,goal:"massa",goalTxt:"Cremosa senza panna — yogurt greco al posto della crema",items:[{i:"Pasta",q:"80g",s:"Pasta proteica"},{i:"Salmone fresco",q:"120g",s:"Salmone affumicato 80g"},{i:"Yogurt greco 0%",q:"80g",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Limone",q:"½",s:null},{i:"Aneto o erba cipollina",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Taglia il salmone a cubetti. Cuoci la pasta al dente in acqua salata.","Padella con olio: rosola il salmone 3-4 min con sale, pepe e limone.","Spegni il fuoco. Aggiungi lo yogurt greco e mescola fino a crema. NON tornare sul fuoco (altrimenti impazzisce).","Scola la pasta lasciando 2 cucchiai d'acqua di cottura. Manteca nella crema di salmone con aneto."],tips:"Variante fit del classico salmone e panna — yogurt greco al posto della panna dà cremosità con +proteine e -grassi. Idea utilizzata anche in molte ricette di pasta proteica per sportivi. Fonte: agrodolce.it/ricette/pasta-con-proteine-al-salmone"},
{id:213,ing:"pasta",name:"Pasta e Ceci alla Romana",emoji:"🫘",diff:1,time:20,serv:1,kcal:475,p:18,c:69,f:14,goal:"energia",goalTxt:"Cucina povera italiana — proteine vegetali complete",items:[{i:"Ditalini o tubetti",q:"60g",s:"Mezze maniche"},{i:"Ceci in scatola",q:"150g (scolati)",s:"Ceci secchi 70g già ammollati"},{i:"Passata di pomodoro",q:"80g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Rosmarino",q:"1 rametto",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Peperoncino",q:"q.b.",s:null}],steps:["Olio in casseruola con aglio schiacciato e rosmarino. 1 min a fuoco basso.","Aggiungi ceci scolati e schiaccia metà con la forchetta. Insaporisci 2 min.","Passata di pomodoro + 500ml acqua bollente. Porta a bollore.","Aggiungi la pasta direttamente nella zuppa. Cuoci secondo tempo confezione mescolando. Deve restare brodosa. Peperoncino e olio a crudo."],tips:"Pasta e ceci alla romana è uno dei piatti unici più tradizionali del Lazio. Cereali + legumi = proteine complete con tutti gli aminoacidi essenziali. Fonte: buonissimo.it/abbinare-cereali-legumi + tradizione regionale italiana"},
{id:214,ing:"pasta",name:"Pasta Pomodoro e Ricotta",emoji:"🍅",diff:1,time:12,serv:1,kcal:510,p:21,c:67,f:17,goal:"energia",goalTxt:"Cremosa al pomodoro — comfort food bilanciato",items:[{i:"Pasta",q:"80g",s:"Pasta proteica"},{i:"Passata di pomodoro",q:"120g",s:null},{i:"Ricotta vaccina",q:"80g",s:"Ricotta di pecora"},{i:"Parmigiano",q:"8g",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Basilico fresco",q:"q.b.",s:null}],steps:["Olio + aglio in padella 1 min. Aggiungi passata di pomodoro, sale e basilico. Cuoci 8-10 min a fuoco lento.","Intanto cuoci la pasta al dente.","Scola la pasta e uniscila al sugo. Mescola 1 min.","Spegni il fuoco. Aggiungi la ricotta a cucchiaiate e amalgama fino a crema. Parmigiano grattugiato."],tips:"La ricotta si aggiunge SEMPRE a fuoco spento, altrimenti diventa granulosa. Ricca di siero-proteine ad alto valore biologico. Fonte: madsport.it/blog/news/pasta-proteica-due-semplici-ricette"},
{id:215,ing:"pollo",name:"Poke Bowl di Pollo all'Italiana",emoji:"🥙",diff:2,time:25,serv:1,kcal:615,p:52,c:55,f:21,goal:"massa",goalTxt:"Poke italiana con pesto — 52g proteine",items:[{i:"Riso basmati cotto",q:"150g",s:"Quinoa o riso integrale"},{i:"Petto di pollo",q:"130g (crudo)",s:"Tacchino"},{i:"Pomodorini",q:"80g",s:null},{i:"Avocado",q:"50g (¼)",s:null},{i:"Edamame",q:"50g",s:"Fagiolini"},{i:"Pesto genovese",q:"10g",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Cuoci il riso basmati e lascialo intiepidire.","Griglia il petto di pollo 6-7 min per lato. Taglia a cubetti.","Lessa gli edamame 4 min in acqua bollente. Taglia avocado e pomodorini.","Componi la bowl: riso alla base, pollo al centro, attorno pomodorini, avocado, edamame. Pesto sciolto con un filo d'olio sopra il pollo."],tips:"Versione italiana della poke hawaiana firmata Amadori. Il pesto genovese al posto della salsa di soia mantiene il piatto 100% mediterraneo. Fonte: amadori.it/ama-il-benessere/pollo-grigliato-al-pesto-nella-tua-poke-bowl"},
{id:216,ing:"pollo",name:"Poke Bowl di Pollo Hawaiana",emoji:"🍍",diff:2,time:25,serv:1,kcal:610,p:54,c:63,f:16,goal:"massa",goalTxt:"Poke originale — pollo marinato e edamame",items:[{i:"Riso basmati cotto",q:"150g",s:"Quinoa"},{i:"Petto di pollo",q:"130g (crudo)",s:null},{i:"Avocado",q:"50g",s:null},{i:"Pomodorini",q:"60g",s:null},{i:"Edamame",q:"60g",s:null},{i:"Mais",q:"40g",s:null},{i:"Salsa di soia",q:"10ml",s:null},{i:"Lime",q:"½",s:null},{i:"Semi di sesamo",q:"q.b.",s:null}],steps:["Cuoci il riso e lascialo intiepidire.","Griglia il petto di pollo 6-7 min per lato. Taglia a cubetti.","Marinatura: in ciotola mescola salsa di soia, succo di lime, erba cipollina. Aggiungi il pollo cubetti e lascia marinare 10 min.","Componi la bowl: riso alla base, pollo marinato al centro, attorno avocado, pomodorini, edamame e mais. Semi di sesamo a finire."],tips:"La poke bowl nasce alle Hawaii nel '700 dai pescatori che mangiavano il pescato a cubetti in barca. La versione con pollo è la più richiesta in Italia. Fonte: cookist.it/poke-bowl-di-pollo"},
{id:217,ing:"cereali",name:"Insalata di Farro con Pollo e Pomodorini",emoji:"🌾",diff:1,time:15,serv:1,kcal:565,p:54,c:49,f:18,goal:"massa",goalTxt:"Tradizione toscana + pollo grigliato — 54g proteine",items:[{i:"Farro perlato cotto",q:"180g",s:"Orzo perlato"},{i:"Petto di pollo",q:"130g (crudo)",s:"Tacchino"},{i:"Pomodorini",q:"100g",s:null},{i:"Parmigiano scaglie",q:"10g",s:null},{i:"Rucola",q:"30g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Limone",q:"½",s:null}],steps:["Cuoci il farro in acqua salata 20 min. Scola e raffredda.","Griglia il pollo 6 min per lato. Taglia a striscioline.","In una ciotola unisci farro, pollo, pomodorini a metà, rucola.","Condisci con olio EVO, succo di limone, sale e pepe. Scaglie di parmigiano sopra."],tips:"L'abbinamento farro-pollo era già usato dai legionari romani come pasto da campagna. Oggi è uno dei meal prep più amati dai runner. Conserva 2 giorni in frigo. Fonte: buonissimo.it/abbinare-cereali-legumi + tradizione regionale"},
{id:218,ing:"vegetale",name:"Zuppa di Legumi e Cereali Toscana",emoji:"🍲",diff:2,time:40,serv:2,kcal:595,p:30,c:83,f:15,goal:"energia",goalTxt:"Piatto unico toscano — comfort food invernale",items:[{i:"Lenticchie secche",q:"50g",s:"Lenticchie di Castelluccio"},{i:"Ceci in scatola",q:"100g (scolati)",s:null},{i:"Cannellini in scatola",q:"100g (scolati)",s:null},{i:"Farro perlato",q:"40g (crudo)",s:"Orzo"},{i:"Cipolla",q:"½ (30g)",s:null},{i:"Sedano e carota",q:"1+1",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Rosmarino",q:"1 rametto",s:null}],steps:["Trita sedano, carota e cipolla. Soffriggi in olio EVO 5 min a fuoco basso.","Aggiungi le lenticchie sciacquate. Tosta 1 min.","Versa 1 litro di brodo vegetale bollente. Aggiungi ceci e cannellini scolati, farro sciacquato e rosmarino.","Cuoci 30 min a fuoco basso coperto. Aggiusta sale e pepe. Olio a crudo nel piatto."],tips:"Comfort food tipico toscano, esempio della 'cucina povera' italiana — ingredienti semplici, piatto completo. Si conserva 24h in frigo, ma migliora insaporendosi. Fonte: cookaround.com/ricetta/Zuppa-di-legumi-e-cereali"},
{id:219,ing:"pesce",name:"Riso Venere con Gamberi e Avocado",emoji:"🦐",diff:2,time:25,serv:1,kcal:530,p:35,c:55,f:20,goal:"energia",goalTxt:"Bowl elegante — riso venere italiano e gamberi",items:[{i:"Riso venere cotto",q:"160g",s:"Riso basmati"},{i:"Gamberi sgusciati",q:"150g",s:"Mazzancolle"},{i:"Avocado",q:"60g (¼)",s:null},{i:"Pomodorini",q:"80g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Limone",q:"½",s:null},{i:"Prezzemolo",q:"q.b.",s:null}],steps:["Cuoci il riso venere 35-40 min in acqua salata (o usa quello precotto).","Padella con olio + aglio. Salta i gamberi 2 min per lato a fuoco vivace con sale e pepe.","Taglia avocado a cubetti e pomodorini a metà.","Componi la bowl: riso venere base, gamberi caldi, avocado, pomodorini. Limone, prezzemolo e pepe."],tips:"Il riso venere è 100% italiano, coltivato nella Pianura Padana — più ricco di fibre e antiossidanti del basmati. Combinato con gamberi e avocado = piatto da ristorante in 25 min. Fonte: parmalat.it/magazine/dieta-sana/poke-bowl"},
{id:220,ing:"cereali",name:"Bowl di Quinoa con Tonno e Pomodorini",emoji:"🥗",diff:1,time:15,serv:1,kcal:490,p:41,c:50,f:15,goal:"definizione",goalTxt:"Quinoa = pseudocereale con tutti gli aminoacidi",items:[{i:"Quinoa cotta",q:"200g (~80g crudi)",s:"Cous cous integrale"},{i:"Tonno al naturale",q:"120g",s:null},{i:"Pomodorini",q:"100g",s:null},{i:"Avocado",q:"40g",s:null},{i:"Cipolla rossa",q:"¼",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Limone",q:"½",s:null},{i:"Origano e basilico",q:"q.b.",s:null}],steps:["Sciacqua bene la quinoa. Cuoci in acqua salata 12 min finché diventa traslucida. Scola e raffredda.","Sgocciola bene il tonno. Pomodorini a metà, cipolla a fettine sottili, avocado a cubetti.","In ciotola unisci tutto: quinoa, tonno sbriciolato, verdure.","Condisci con olio, limone, origano, basilico, sale e pepe."],tips:"La quinoa è uno pseudocereale ma contiene tutti i 9 aminoacidi essenziali, cosa rarissima nel mondo vegetale. Combinata con tonno = bowl super proteica per la definizione. Fonte: parmalat.it/magazine/dieta-sana/poke-bowl + dmnutrition.it"},
{id:221,ing:"pasta",name:"Pasta con Pollo e Zucchine Light",emoji:"🍝",diff:1,time:20,serv:1,kcal:545,p:42,c:62,f:14,goal:"massa",goalTxt:"Pasta cremosa senza panna — pollo, zucchine e limone",items:[{i:"Pasta",q:"80g",s:"Pasta integrale"},{i:"Petto di pollo",q:"120g (crudo)",s:"Tacchino"},{i:"Zucchine",q:"150g",s:null},{i:"Cipollotto",q:"1",s:"Cipolla bianca"},{i:"Olio EVO",q:"8ml",s:null},{i:"Parmigiano",q:"8g",s:null},{i:"Limone",q:"½ (scorza grattugiata)",s:null},{i:"Timo",q:"q.b.",s:null}],steps:["Taglia il pollo a striscioline. Affetta sottile cipollotto e zucchine.","Olio in padella + cipollotto: 2 min a fuoco basso. Aggiungi zucchine 4 min.","Alza la fiamma, aggiungi pollo e cuoci 8-10 min finché dorato. Sala, pepa.","Cuoci la pasta al dente. Scola lasciando 2 cucchiai acqua cottura. Manteca in padella 1 min con scorza di limone, timo e parmigiano."],tips:"Variante light senza panna — l'acqua di cottura e il parmigiano creano la cremosità. Lo trovi anche in versione con panna su Giallo Zafferano, ma questa versione fit ha 100 kcal in meno. Fonte: giallozafferano.com/recipes/pasta-with-chicken-and-zucchini + tradizione italiana"},
{id:222,ing:"pasta",name:"Pasta con Crema di Zucchine",emoji:"🥒",diff:1,time:15,serv:1,kcal:465,p:18,c:64,f:16,goal:"energia",goalTxt:"Cremosa senza panna — solo zucchine frullate",items:[{i:"Pasta",q:"80g",s:"Spaghetti, fusilli"},{i:"Zucchine",q:"200g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Parmigiano",q:"15g",s:"Lievito alimentare per vegan"},{i:"Basilico",q:"q.b.",s:null},{i:"Pepe",q:"q.b.",s:null}],steps:["Taglia le zucchine a cubetti. Padella con olio + aglio schiacciato.","Cuoci le zucchine 5-6 min finché morbide. Aggiungi un mestolo d'acqua di cottura della pasta. Frulla con basilico fino a crema liscia.","Cuoci la pasta al dente. Scola e versala nella crema di zucchine.","Salta 1 minuto. Parmigiano grattugiato e pepe nero."],tips:"La cremosità arriva dal solo frullato di zucchine + olio EVO + acqua di cottura. Zero panna, zero formaggi pesanti. Ricetta classica della cucina light italiana. Fonte: farmaciaresana.it/blog/ricetta-pasta-e-zucchine-dietetica + ricettevegolose.com"},
{id:223,ing:"pollo",name:"Pollo alle Erbe Aromatiche con Patate",emoji:"🍗",diff:1,time:30,serv:1,kcal:440,p:45,c:34,f:13,goal:"massa",goalTxt:"Pollo arrosto della domenica — meal prep settimanale",items:[{i:"Petto di pollo",q:"180g (crudo)",s:"Coscia disossata"},{i:"Patate",q:"200g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Rosmarino e timo",q:"2 rametti",s:null},{i:"Limone",q:"½",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Forno 200°C. Taglia le patate a spicchi, condisci con olio, sale, pepe e rosmarino.","Inforna le patate 20 min in teglia con carta forno.","Condisci il pollo intero con olio, succo di limone, aglio schiacciato e timo.","Aggiungi il pollo alle patate. Cuoci altri 15-18 min finché il pollo è dorato e cotto. Riposo 5 min prima di tagliare."],tips:"Pranzo da fare di domenica in batch: cuoci 600g di pollo + 600g patate in 35 min = 3 pranzi pronti per la settimana. Il classico della cucina italiana familiare. Fonte: tradizione regionale italiana"},
{id:224,ing:"pollo",name:"Bocconcini di Pollo e Zucchine in Padella",emoji:"🥘",diff:1,time:18,serv:1,kcal:310,p:44,c:7,f:11,goal:"definizione",goalTxt:"44g proteine, 310 kcal — re della definizione",items:[{i:"Petto di pollo",q:"180g (crudo)",s:"Tacchino"},{i:"Zucchine",q:"150g",s:null},{i:"Cipolla",q:"30g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Taglia il pollo a tocchetti e le zucchine a fettine. Cipolla a fettine sottili.","Padella con olio + cipolla: 2 min a fuoco basso.","Aggiungi pollo e zucchine. Salta 5 min a fuoco alto.","Unisci mezzo bicchiere d'acqua, coperchio, cuoci 12-15 min a fuoco basso mescolando ogni tanto. Prezzemolo a fine cottura."],tips:"Piatto unico ultra-proteico e low-carb, perfetto in fase di definizione. 44g proteine con sole 310 kcal — il rapporto proteine/kcal più alto della sezione. Fonte: semplicementelight.com/bocconcini-di-pollo-e-zucchine"},
{id:225,ing:"pesce",name:"Orata al Forno con Patate al Limone",emoji:"🐟",diff:2,time:35,serv:1,kcal:500,p:43,c:42,f:17,goal:"recovery",goalTxt:"Pesce mediterraneo — omega-3 + carb complessi",items:[{i:"Filetto di orata",q:"180g",s:"Filetto branzino"},{i:"Patate",q:"250g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Rosmarino e timo",q:"1 rametto",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Forno 200°C. Sbuccia le patate, tagliale a fette di 1 cm. Disponile su teglia con carta forno. Olio, sale, pepe.","Inforna le patate 15 min.","Condisci l'orata con olio, succo di limone, rosmarino, sale e pepe.","Adagia l'orata sulle patate. Inforna altri 15-18 min. L'orata è cotta quando si stacca facilmente con la forchetta."],tips:"Classico della cucina italiana di mare — l'orata è un pesce magro con omega-3, e si presta perfettamente alla cottura al forno semplice. Cucchiaio d'Argento la consiglia per il pranzo della domenica. Fonte: cucchiaio.it/ricetta/ricetta-branzino-forno + giallozafferano.it"},
{id:226,ing:"pesce",name:"Branzino al Cartoccio con Pomodorini",emoji:"🐠",diff:1,time:25,serv:1,kcal:300,p:34,c:6,f:16,goal:"definizione",goalTxt:"Ultra-magro al cartoccio — sapore mediterraneo",items:[{i:"Filetto di branzino",q:"200g",s:"Filetto orata"},{i:"Pomodorini",q:"100g",s:null},{i:"Olive taggiasche",q:"20g",s:null},{i:"Capperi",q:"10g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Timo",q:"1 rametto",s:null}],steps:["Forno 200°C. Stendi un foglio di carta forno grande.","Adagia il branzino. Aggiungi pomodorini a metà, olive, capperi, fettine di limone, timo.","Condisci con olio, sale e pepe. Chiudi la carta forno a caramella, poi avvolgi in stagnola.","Inforna 18-20 min. Apri il cartoccio al tavolo per il profumo."],tips:"Il cartoccio mantiene il vapore e i sapori — il pesce esce tenerissimo. Ricetta tradizionale della cucina costiera italiana. Solo 300 kcal con 34g proteine. Fonte: giallozafferano.it/ricerca-ricette/orate+e+branzino"},
{id:227,ing:"vegetale",name:"Insalata di Quinoa e Ceci",emoji:"🥗",diff:1,time:15,serv:1,kcal:485,p:19,c:65,f:17,goal:"energia",goalTxt:"Pseudocereale + legumi = proteine vegetali complete",items:[{i:"Quinoa cotta",q:"180g (~70g crudi)",s:"Cous cous integrale"},{i:"Ceci in scatola",q:"150g (scolati)",s:null},{i:"Pomodorini",q:"80g",s:null},{i:"Cetriolo",q:"60g",s:null},{i:"Rucola",q:"30g",s:"Spinacino"},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Prezzemolo e menta",q:"q.b.",s:null}],steps:["Sciacqua la quinoa sotto acqua corrente. Cuoci 12 min in acqua salata. Scola e raffredda.","Scola e sciacqua i ceci. Taglia pomodorini a metà e cetriolo a cubetti.","In ciotola unisci quinoa, ceci, verdure e rucola.","Condisci con olio, limone, sale, pepe e erbe fresche."],tips:"La quinoa è uno pseudocereale con tutti gli aminoacidi essenziali. Combinata con i ceci dà proteine vegetali complete come una bistecca. Si conserva 2 giorni in frigo. Fonte: lapalestra.it/ricette-vegetariane-proteine"},
{id:228,ing:"vegetale",name:"Burger di Lenticchie al Forno",emoji:"🌱",diff:2,time:30,serv:2,kcal:450,p:25,c:61,f:13,goal:"energia",goalTxt:"Burger vegetali fatti in casa — 25g proteine",items:[{i:"Lenticchie in scatola",q:"200g (scolate)",s:"Lenticchie cotte"},{i:"Farina d'avena",q:"30g",s:"Pangrattato"},{i:"Uovo",q:"1",s:null},{i:"Carota",q:"60g (1 piccola)",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Insalata mista",q:"80g",s:null},{i:"Pomodorini",q:"60g",s:null},{i:"Spezie (cumino, paprika)",q:"q.b.",s:null}],steps:["Forno 180°C. Scola e schiaccia le lenticchie con la forchetta lasciando alcuni pezzi interi.","Grattugia la carota. Mescola lenticchie, carota, uovo, farina d'avena, spezie, sale, pepe.","Forma 4 burger spessi 1,5 cm. Disponi su teglia con carta forno.","Inforna 20 min girando a metà. Servi su letto di insalata mista e pomodorini con un filo d'olio."],tips:"Burger vegetali fatti in casa, senza conservanti né additivi. Le lenticchie sono i legumi più digeribili. Si congelano cotti e si conservano 1 mese. Fonte: lapalestra.it/ricette-vegetariane-proteine + tradizione italiana"},

{id:301,ing:"liquidi",name:"Shake Whey e Banana",emoji:"🥤",diff:1,time:3,serv:1,kcal:320,p:32,c:42,f:3,goal:"recovery",goalTxt:"Il gold standard — entro 30 min dal workout",items:[{i:PP+" (whey)",q:"30g",s:"Proteine vegane"},{i:"Banana matura",q:"1 grande (130g)",s:null},{i:"Latte scremato",q:"250ml",s:null},{i:"Miele",q:"10g",s:null}],steps:["Sbuccia la banana e spezzala in 3-4 pezzi nel frullatore.","Aggiungi il latte scremato, le proteine in polvere e il miele.","Frulla alla massima potenza per 20-30 secondi. Bevi entro 5 minuti."],tips:"Il GOLD STANDARD post-workout. Whey isolate = assorbimento più rapido (20-30 min). La banana fornisce carb ad alto IG + potassio perso col sudore."},
{id:302,ing:"liquidi",name:"Frullato Frutti di Bosco Recovery",emoji:"🍓",diff:1,time:4,serv:1,kcal:310,p:30,c:40,f:3,goal:"recovery",goalTxt:"Antiossidanti + proteine — anti-DOMS",items:[{i:PP+" vaniglia",q:"30g",s:null},{i:"Frutti di bosco",q:"120g (surgelati ok)",s:null},{i:"Banana",q:"½",s:null},{i:"Latte scremato",q:"200ml",s:null},{i:"Miele",q:"12g",s:null}],steps:["Frutti di bosco nel frullatore per primi (surgelati = più denso).","Aggiungi banana, latte, proteine e miele. Frulla 40 secondi.","Versa e bevi subito. I surgelati lo rendono quasi un gelato."],tips:"I polifenoli dei frutti di bosco riducono DOMS e infiammazione del 25-30%. Surgelati = stessi nutrienti, costo inferiore."},
{id:303,ing:"solidi",name:"Gallette Whey e Miele",emoji:"🍯",diff:1,time:3,serv:1,kcal:330,p:28,c:44,f:3,goal:"recovery",goalTxt:"Zero cottura, 3 min — il più pratico",items:[{i:"Gallette di riso",q:"4 (~40g)",s:null},{i:PP,q:"30g",s:null},{i:"Latte scremato",q:"150ml",s:null},{i:"Miele millefiori",q:"15g",s:null}],steps:["Prepara shake veloce: latte + proteine nello shaker.","Spalma miele sulle gallette. Mangia gallette + bevi shake.","Consumo entro 30 min dal workout."],tips:"Il combo solido+liquido è perfetto: gallette = carb rapidi, shake = proteine. Zero cottura, portatile."},
{id:304,ing:"solidi",name:"Piadina Albumi e Prosciutto",emoji:"🫓",diff:1,time:8,serv:1,kcal:340,p:34,c:36,f:5,goal:"recovery",goalTxt:"Pasto solido rapido — alta proteina",items:[{i:"Piadina bianca",q:"1 (60g)",s:null},{i:"Albumi",q:"150g (5)",s:null},{i:"Prosciutto cotto",q:"40g",s:"Bresaola"},{i:"Pomodoro",q:"½",s:null}],steps:["Scalda piadina in padella 15-20 sec per lato.","Strapazza albumi 1,5 min a fuoco alto con olio spray.","Farcisci con albumi, prosciutto e pomodoro. Arrotola."],tips:"Post-workout = albumi SENZA tuorlo. Il grasso del tuorlo rallenterebbe l'assorbimento proteico nella finestra anabolica."},
{id:305,ing:"yogurt",name:"Yogurt Greco Recovery Bowl",emoji:"💚",diff:1,time:3,serv:1,kcal:370,p:36,c:44,f:4,goal:"recovery",goalTxt:"36g proteine in 3 min — il re del recovery",items:[{i:"Yogurt greco 0%",q:"250g",s:null},{i:PP,q:"20g",s:null},{i:"Banana",q:"1 media",s:null},{i:"Miele millefiori",q:"15g",s:null},{i:"Riso soffiato",q:"15g",s:null}],steps:["Yogurt + proteine in ciotola. Mescola vigorosamente 20-30 sec.","Banana a rondelle sopra. Riso soffiato per crunch.","Miele a filo. Consuma entro 30 min dal workout."],tips:"Yogurt greco 0% ha 10g proteine per 100g naturalmente. Con proteine aggiunte arrivi a 36g in 3 minuti. Riso soffiato = carb ad alto IG per il glicogeno."},
{id:306,ing:"yogurt",name:"Ricotta e Frutta Fresca",emoji:"🍎",diff:1,time:3,serv:1,kcal:260,p:22,c:30,f:6,goal:"recovery",goalTxt:"Mediterraneo e leggero — proteina naturale",items:[{i:"Ricotta vaccina",q:"200g",s:"Fiocchi di latte"},{i:"Banana",q:"½",s:null},{i:"Miele",q:"12g",s:null},{i:"Fragole",q:"80g",s:"Frutti di bosco"},{i:"Cannella",q:"un pizzico",s:null}],steps:["Ricotta in ciotola, monta leggermente con forchetta.","Banana a rondelle, fragole a fettine sopra.","Miele e cannella."],tips:"La ricotta italiana ha caseine a digestione lenta = sintesi proteica prolungata. Perfetta per il recupero."},

{id:307,ing:"solidi",name:"Petto di Pollo Grigliato con Patate Dolce",emoji:"🍠",diff:1,time:25,serv:1,kcal:375,p:34,c:43,f:8,goal:"recovery",goalTxt:"Pasto completo post-WO — 34g proteine + carb complessi",items:[{i:"Petto di pollo",q:"130g (crudo)",s:"Tacchino"},{i:"Patate dolci",q:"200g",s:"Patate normali"},{i:"Zucchine grigliate",q:"100g",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Erbe aromatiche",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Taglia le patate dolci a fette spesse 1 cm. Forno a 200°C: 20 min su carta forno con olio e sale.","Griglia il petto di pollo (battuto a 1,5 cm) 4 min per lato con sale e pepe.","Salta le zucchine in padella 5 min.","Componi il piatto: patate dolci, pollo a strisce, zucchine."],tips:"Pasto completo post-allenamento secondo nutrizioniste sportive italiane: carboidrati complessi (patate dolci) + proteine magre (pollo) + verdure + grassi sani (olio EVO). Ideale dopo allenamenti serali. Fonte: nutrizionesana.it/alimentazione-post-allenamento"},

{id:308,ing:"yogurt",name:"Bowl Yogurt Avena e Banana",emoji:"🥣",diff:1,time:5,serv:1,kcal:390,p:28,c:65,f:4,goal:"recovery",goalTxt:"Bowl classica recovery — 28g proteine in 5 min",items:[{i:"Yogurt greco 0%",q:"200g",s:null},{i:"Fiocchi d'avena",q:"40g",s:null},{i:"Banana matura",q:"1 media (100g)",s:null},{i:"Miele",q:"10g",s:null},{i:"Cannella",q:"q.b.",s:null}],steps:["Versa lo yogurt greco in una ciotola.","Aggiungi i fiocchi d'avena e mescola.","Taglia la banana a rondelle sopra. Miele a filo e cannella."],tips:"Bowl recovery classica raccomandata dai nutrizionisti sportivi. Yogurt greco = caseine a digestione lenta + whey naturali. Avena = carb complessi. Banana = potassio perso col sudore. Fonte: buddyfit.club/esempi-di-pasti-post-allenamento"},

{id:309,ing:"solidi",name:"Tonno Aromatizzato al Limone su Pane Bianco",emoji:"🐟",diff:1,time:5,serv:1,kcal:335,p:37,c:36,f:4,goal:"recovery",goalTxt:"37g proteine + omega-3 — recovery proteico veloce",items:[{i:"Tonno al naturale",q:"120g (1 scatola grande)",s:null},{i:"Pane bianco",q:"70g (2 fette)",s:"Pane integrale"},{i:"Limone",q:"½",s:null},{i:"Olio EVO",q:"3ml (½ cucchiaino)",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Pepe nero",q:"q.b.",s:null}],steps:["Sgocciola bene il tonno e mettilo in ciotola.","Condisci con scorza di limone grattugiata, succo di limone, prezzemolo tritato, olio EVO e pepe.","Tosta il pane bianco. Distribuisci il tonno sulle fette."],tips:"Il tonno è ricco di omega-3 e vitamina D — perfetto per il recupero. Bimby lo consiglia come pasto post-workout in versione aromatizzata. Pane BIANCO al posto dell'integrale dopo il workout per facilitare l'assorbimento. Fonte: vorwerk.com/it/idee-e-ricette/alimentazione-e-benessere/cosa-mangiare-dopo-allenamento"},

{id:310,ing:"liquidi",name:"Frullato Cioccolato Banana e Whey",emoji:"🍫",diff:1,time:3,serv:1,kcal:355,p:34,c:48,f:4,goal:"recovery",goalTxt:"34g proteine — il post-WO al cioccolato",items:[{i:PP+" cioccolato (whey)",q:"30g",s:"Whey neutra + 1 cucchiaino cacao"},{i:"Banana matura",q:"1 grande (120g)",s:null},{i:"Latte scremato",q:"250ml",s:"Bevanda di soia"},{i:"Cacao amaro",q:"8g",s:null},{i:"Miele",q:"5g",s:null}],steps:["Sbuccia la banana e mettila nel frullatore.","Aggiungi latte, whey, cacao amaro e miele.","Frulla 30 sec alla massima potenza. Bevi entro 5 min."],tips:"Lo standard d'oro post-workout raccomandato dai blog di nutrizione sportiva: whey ad assorbimento rapido (20-30 min) + carb veloci dalla banana. Il cacao amaro aggiunge flavonoidi antinfiammatori. Fonte: runlovers.it/2026/fabbisogno-proteico-runner-recupero-muscolare-guida"},

{id:311,ing:"solidi",name:"Sandwich Tacchino e Banana Recovery",emoji:"🥪",diff:1,time:5,serv:1,kcal:380,p:22,c:67,f:1,goal:"recovery",goalTxt:"Combo solido dolce-salato — anti-catabolismo",items:[{i:"Pane bianco",q:"80g (2 fette grandi)",s:null},{i:"Fesa di tacchino",q:"60g",s:"Prosciutto cotto"},{i:"Banana matura",q:"1 media (80g)",s:null},{i:"Miele",q:"10g",s:null}],steps:["Tosta il pane bianco.","Spalma miele su una fetta. Disponi banana a rondelle e tacchino.","Chiudi a sandwich. Mangia entro 30 min dal workout."],tips:"Combo dolce-salato amato dai runner come pasto post-corsa lunga. Pane bianco + banana = carb ad alto IG per il glicogeno. Tacchino = proteine magre senza grassi. Fonte: nutrizionesana.it/alimentazione-post-allenamento + tradizione runner"},

{id:401,ing:"pesce",name:"Salmone al Forno con Verdure",emoji:"🐟",diff:1,time:25,serv:1,kcal:420,p:38,c:12,f:24,goal:"recovery",goalTxt:"Omega-3 + recupero notturno",items:[{i:"Filetto salmone",q:"170g",s:"Trota"},{i:"Zucchine",q:"150g",s:"Asparagi"},{i:"Pomodorini",q:"100g",s:null},{i:"Limone",q:"½",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Rosmarino",q:"1 rametto",s:null}],steps:["Preriscalda forno 200°C. Taglia zucchine a rondelle, pomodorini a metà.","Disponi verdure su teglia con carta forno. Condisci con olio, sale, aglio, rosmarino.","Salmone al centro. Limone, sale e pepe. Inforna 18-20 min.","Sforna. Salmone deve sfogliarsi con la forchetta. Olio a crudo."],tips:"Il salmone è la proteina PERFETTA a cena: omega-3 antinfiammatori + triptofano per il sonno. NON cuocere troppo — secco = meno digeribile."},
{id:402,ing:"pesce",name:"Merluzzo in Padella con Spinaci",emoji:"🐠",diff:1,time:15,serv:1,kcal:280,p:36,c:6,f:12,goal:"definizione",goalTxt:"Ultra-magro — re della definizione",items:[{i:"Filetto merluzzo",q:"200g",s:"Platessa"},{i:"Spinaci freschi",q:"150g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Pomodorini",q:"80g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Limone",q:"½",s:null},{i:"Peperoncino",q:"q.b.",s:null}],steps:["Asciuga bene il merluzzo con carta. Sala e pepa.","Padella con olio+aglio. Merluzzo 3-4 min per lato. Non muovere.","Togli pesce. Stessa padella: spinaci+pomodorini 3 min. Limone.","Componi: spinaci base, merluzzo sopra, sugo dei pomodorini."],tips:"Il merluzzo ha 17g proteine e ZERO grassi per 100g. Asciugarlo bene = crosta croccante perfetta."},
{id:403,ing:"pesce",name:"Gamberetti Aglio e Prezzemolo",emoji:"🦐",diff:1,time:12,serv:1,kcal:260,p:32,c:10,f:10,goal:"definizione",goalTxt:"12 minuti — leggero e proteico",items:[{i:"Gamberetti sgusciati",q:"200g",s:"Mazzancolle"},{i:"Zucchine",q:"200g",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Peperoncino",q:"q.b.",s:null},{i:"Limone",q:"½",s:null}],steps:["Se surgelati: scongela in acqua FREDDA 5 min. Asciuga BENE.","Zucchine a dadini 1 cm. Padella alta con olio+aglio: zucchine 4 min.","Aggiungi gamberetti. Fuoco ALTO 2 min per lato. Peperoncino.","Prezzemolo abbondante, limone, pepe. Servi subito."],tips:"Gamberetti: 24g proteine, 1g grassi per 100g. Aglio+prezzemolo = la combo della cucina di mare italiana."},
{id:404,ing:"pollo",name:"Petto di Pollo e Broccoli",emoji:"🍗",diff:1,time:18,serv:1,kcal:360,p:42,c:14,f:14,goal:"massa",goalTxt:"Il classico — mai fuori moda",items:[{i:"Petto pollo",q:"180g",s:"Tacchino"},{i:"Broccoli",q:"200g",s:"Cavolfiore"},{i:"Aglio",q:"1 spicchio",s:null},{i:"Paprika",q:"3g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Peperoncino",q:"q.b.",s:null}],steps:["Batti il pollo a spessore uniforme (~1,5 cm). Condisci con paprika, sale, pepe.","Padella CALDA con olio: 4-5 min per lato SENZA muovere. Riposo 3 min.","Broccoli a cimette. Stessa padella con aglio: 5 min con coperchio.","Componi: broccoli, pollo a fette, limone e peperoncino."],tips:"BATTERE il pollo = cottura uniforme = mai secco. Riposo 3 min = succosità. MEAL PREP: griglia 500g la domenica."},

{id:408,ing:"nocook",name:"Caprese Proteica",emoji:"🇮🇹",diff:1,time:5,serv:1,kcal:340,p:22,c:8,f:24,goal:"energia",goalTxt:"Tricolore italiano — semplicità assoluta",items:[{i:"Mozzarella di bufala",q:"125g",s:"Mozzarella light"},{i:"Pomodori cuore di bue",q:"200g",s:null},{i:"Basilico fresco",q:"6-8 foglie",s:null},{i:"Olio EVO",q:"12ml",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Sale Maldon",q:"q.b.",s:null}],steps:["Pomodori a fette spesse 1 cm.","Mozzarella a fette, alternata ai pomodori.","Basilico, olio EVO, sale e origano."],tips:"La caprese è la perfezione della semplicità italiana. Mozzarella DOP = 18g proteine per 100g. Per definizione usa mozzarella light."},

{id:410,ing:"nocook",name:"Bresaola Rucola e Parmigiano",emoji:"🥩",diff:1,time:5,serv:1,kcal:270,p:32,c:2,f:14,goal:"definizione",goalTxt:"5 min, zero cottura — il più italiano",items:[{i:"Bresaola della Valtellina",q:"100g",s:"Carpaccio manzo"},{i:"Rucola",q:"60g",s:null},{i:"Parmigiano scaglie",q:"20g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Pepe nero",q:"q.b.",s:null}],steps:["Disponi bresaola su piatto grande.","Rucola al centro. Scaglie di parmigiano con pelapatate.","Condisci con olio, limone abbondante e pepe nero."],tips:"Bresaola = 2% grassi, 33g proteine per 100g. IL salume più magro in assoluto. Con parmigiano e rucola = il piatto italiano per eccellenza."},

{id:412,ing:"pesce",name:"Pesce Spada al Forno",emoji:"🐟",diff:1,time:20,serv:1,kcal:355,p:35,c:5,f:23,goal:"recovery",goalTxt:"Pesce azzurro — omega-3 ricchissimi per il recupero",items:[{i:"Trancio di pesce spada",q:"180g",s:"Tonno fresco"},{i:"Pomodorini",q:"120g",s:null},{i:"Olive nere",q:"15g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Aglio",q:"1 spicchio",s:null}],steps:["Forno 200°C. Disponi il pesce spada su teglia con carta forno.","Pomodorini a metà, olive, aglio schiacciato attorno al pesce.","Condisci con olio, succo di limone, origano, sale e pepe.","Inforna 12-15 min. Il pesce è cotto quando si sfalda con la forchetta."],tips:"Il pesce spada è ricco di omega-3, vitamina D, selenio. Cottura al forno = leggera. Ricetta consigliata da Buttalapasta tra le cene dietetiche italiane. Cottura veloce, sapore intenso. Fonte: buttalapasta.it/storie/cena-e-dieta-piatti-light-da-mangiare-di-sera"},

{id:413,ing:"vegetale",name:"Frittata di Albumi con Mozzarella Light e Spinaci",emoji:"🍳",diff:1,time:10,serv:1,kcal:245,p:30,c:5,f:12,goal:"definizione",goalTxt:"245 kcal, 30g proteine — la cena più magra del ricettario",items:[{i:"Albumi",q:"150g (5)",s:null},{i:"Mozzarella light",q:"50g",s:"Mozzarella di latte vaccino"},{i:"Spinaci freschi",q:"100g",s:"Bietola"},{i:"Olio EVO",q:"5ml",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Lava gli spinaci. Padella con olio: appassisci gli spinaci 2-3 min. Togli dal fuoco.","Sbatti gli albumi con sale e pepe. Aggiungi gli spinaci scolati dall'acqua.","Versa nella stessa padella. Cuoci 3 min a fuoco basso. Aggiungi mozzarella a pezzetti.","Coperchio 2 min finché mozzarella fila. Piega a mezzaluna."],tips:"La cena più magra del ricettario: 245 kcal con 30g proteine. Ricetta consigliata dai nutrizionisti italiani per chi cerca pasti serali ipocalorici e ipolipidici. Fonte: nutriviva.it/cene-proteiche-veloci-20-minuti"},

{id:414,ing:"pesce",name:"Tonno alla Griglia con Insalata e Limone",emoji:"🍣",diff:1,time:12,serv:1,kcal:350,p:36,c:5,f:21,goal:"recovery",goalTxt:"Filetto di tonno fresco — sapore intenso, cottura rapida",items:[{i:"Filetto di tonno fresco",q:"160g",s:"Pesce spada"},{i:"Insalata mista",q:"80g",s:"Misticanza"},{i:"Pomodorini",q:"80g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Limone",q:"1",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Marina il tonno 5 min con sale, olio, prezzemolo e succo di mezzo limone.","Padella o griglia ben calde. Cuoci il tonno 1,5-2 min per lato: deve restare rosato al centro.","Prepara l'insalata con pomodorini, olio, limone, sale.","Servi il tonno sopra l'insalata con limone a spicchi."],tips:"Il tonno fresco va cotto BREVEMENTE — rosato al centro = morbido. Cottura prolungata = secco e gommoso. Cena tipica della cucina di mare italiana, ricca di omega-3 e proteine magre. Fonte: sangavinomonreale.net/idee-per-una-cena-light-proteica"},
{id:415,ing:"pesce",name:"Salmone al Forno con Patate",emoji:"🐟",diff:1,time:25,serv:1,kcal:535,p:35,c:34,f:28,goal:"recovery",goalTxt:"Classico per cena della domenica — omega-3 e carb",items:[{i:"Filetto di salmone",q:"150g",s:"Trota salmonata"},{i:"Patate",q:"200g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Limone",q:"½",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Rosmarino",q:"1 rametto",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Forno 200°C. Sbuccia le patate e tagliale a spicchi. Condisci con olio, sale, rosmarino. Inforna 20 min.","Emulsiona olio, succo di limone, prezzemolo tritato, sale e pepe.","Adagia il salmone su carta forno con la pelle verso il basso. Spennella con l'emulsione.","Aggiungi alla teglia delle patate. Inforna altri 12-15 min. Il salmone è cotto quando si sfalda."],tips:"Il salmone va lasciato con la pelle: fa da barriera col calore e lo mantiene morbido. Non cuocerlo troppo o si secca. Ricetta classica della tradizione italiana di mare. Fonte: cookist.it/salmone-al-forno-la-ricetta"},
{id:416,ing:"pesce",name:"Filetto di Branzino con Olive Taggiasche",emoji:"🫒",diff:2,time:20,serv:1,kcal:300,p:34,c:5,f:16,goal:"definizione",goalTxt:"Branzino alla ligure — sapore mediterraneo intenso",items:[{i:"Filetto di branzino",q:"200g",s:"Filetto orata"},{i:"Olive taggiasche",q:"20g",s:"Olive nere"},{i:"Pomodorini",q:"100g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Pinoli (opzionali)",q:"5g",s:null}],steps:["Padella con olio + aglio schiacciato. Soffriggi 1 min.","Aggiungi i pomodorini a metà. 3-4 min finché si ammorbidiscono.","Adagia i filetti di branzino con la pelle verso il basso. Cuoci 4-5 min senza muoverli.","Gira con cura. Aggiungi olive taggiasche, succo di limone e pinoli. 2 min."],tips:"Il branzino alla ligure è uno dei classici della cucina mediterranea italiana. Le olive taggiasche di Liguria sono le più dolci e meno amare. Solo 300 kcal, 34g proteine. Fonte: giallozafferano.it/ricerca-ricette/orate+e+branzino + tradizione ligure"},
{id:417,ing:"pesce",name:"Polpo all'Insalata con Patate",emoji:"🐙",diff:2,time:50,serv:1,kcal:375,p:25,c:29,f:12,goal:"definizione",goalTxt:"Tradizione costiera del Sud — pasto leggero ed elegante",items:[{i:"Polpo",q:"200g (cotto)",s:"Polpo surgelato già cotto"},{i:"Patate lesse",q:"150g",s:null},{i:"Sedano",q:"40g (1 costa)",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Lessa il polpo in acqua leggermente salata per 40-50 min finché tenero (se surgelato già cotto: scaldalo 5 min).","Sbuccia le patate, lessale e tagliale a cubetti.","Taglia il polpo a pezzi e il sedano a fettine sottili.","Unisci tutto in ciotola. Condisci con olio EVO, succo di limone, prezzemolo, sale e pepe. Servi tiepido o freddo."],tips:"Il polpo all'insalata è un classico della cucina campana e pugliese. Il segreto è la cottura lunga e lenta perché diventi tenero. Si conserva 24h in frigo, perfetto come meal prep. Fonte: tradizione regionale italiana + Buttalapasta"},
{id:418,ing:"pesce",name:"Seppie e Piselli alla Veneta",emoji:"🦑",diff:2,time:35,serv:1,kcal:310,p:35,c:14,f:14,goal:"definizione",goalTxt:"Piatto della tradizione veneziana — magro e saporito",items:[{i:"Seppie pulite",q:"200g",s:"Calamari"},{i:"Piselli surgelati",q:"100g",s:null},{i:"Cipolla",q:"30g (½)",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Passata di pomodoro",q:"50g",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Vino bianco (opzionale)",q:"50ml",s:null}],steps:["Trita la cipolla finemente. Padella con olio: cipolla 4-5 min a fuoco basso.","Taglia le seppie ad anelli. Aggiungi alla padella. Salta 3 min a fuoco alto.","Sfuma con vino bianco se vuoi. Aggiungi passata di pomodoro + 100ml acqua.","Cuoci 15 min coperto. Aggiungi piselli, cuoci altri 8-10 min. Prezzemolo a fine cottura."],tips:"Le seppie coi piselli sono un classico della cucina veneta e della tradizione di mare. Le seppie cuociono lentamente per diventare tenere. Si abbina perfettamente con polenta gialla. Fonte: tradizione veneziana"},
{id:419,ing:"pollo",name:"Tagliata di Pollo con Rucola e Parmigiano",emoji:"🥩",diff:1,time:15,serv:1,kcal:340,p:47,c:2,f:16,goal:"definizione",goalTxt:"47g proteine, low-carb — versione fit della tagliata",items:[{i:"Petto di pollo",q:"180g (crudo)",s:"Petto di tacchino"},{i:"Rucola",q:"40g",s:"Spinacino"},{i:"Parmigiano scaglie",q:"15g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Limone",q:"½",s:null},{i:"Aceto balsamico",q:"5ml",s:null}],steps:["Batti il pollo per ottenere uno spessore uniforme di 1-1,5 cm. Sala e pepa.","Padella o griglia ben calde. Cuoci 3-4 min per lato senza muovere.","Lascia riposare 3 min. Taglia a striscioline.","Disponi su letto di rucola. Scaglie di parmigiano col pelapatate. Olio, limone, aceto balsamico."],tips:"Versione fit e proteica della classica tagliata italiana, con pollo al posto del manzo. 47g proteine = il piatto più proteico della sezione. Fonte: cucchiaio.it/fotogallery/ricette-proteiche"},
{id:420,ing:"pollo",name:"Petti di Pollo al Forno con Verdure",emoji:"🍗",diff:1,time:30,serv:1,kcal:320,p:44,c:11,f:12,goal:"definizione",goalTxt:"Pollo al forno con verdure — meal prep settimanale",items:[{i:"Petto di pollo",q:"180g (crudo)",s:"Tacchino"},{i:"Zucchine",q:"100g",s:null},{i:"Peperone",q:"80g",s:null},{i:"Pomodorini",q:"60g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Aglio",q:"1 spicchio",s:null}],steps:["Forno 200°C. Taglia tutte le verdure a cubetti.","Disponi le verdure su teglia con carta forno. Condisci con olio, sale, pepe, origano e aglio schiacciato.","Inforna le verdure 10 min.","Aggiungi il pollo intero (battuto a 1,5 cm di spessore). Inforna altri 15-18 min."],tips:"Pranzo/cena meal prep per eccellenza — cuoci 3-4 porzioni insieme la domenica e le hai pronte per la settimana. Si conserva 3 giorni in frigo. Fonte: melarossa.it/ricette/ultime-dalla-cucina/ricette-di-pollo-light"},
{id:421,ing:"pollo",name:"Tasca di Pollo Ripiena con Spinaci e Ricotta",emoji:"🥬",diff:2,time:30,serv:1,kcal:385,p:52,c:5,f:18,goal:"massa",goalTxt:"52g proteine — la cena più proteica del ricettario",items:[{i:"Petto di pollo",q:"180g (in un unico trancio)",s:null},{i:"Ricotta vaccina",q:"60g",s:null},{i:"Spinaci freschi",q:"80g",s:"Bietola"},{i:"Parmigiano",q:"10g",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Noce moscata",q:"q.b.",s:null}],steps:["Saltare gli spinaci in padella con aglio 2-3 min. Sgocciola bene e trita grossolanamente.","Mescola spinaci, ricotta, parmigiano, noce moscata, sale e pepe.","Incidi il pollo lateralmente per creare una tasca. Riempi con il composto. Chiudi con stuzzicadenti.","Padella con olio: dora il pollo 3 min per lato. Trasferisci in forno 180°C per 12-15 min."],tips:"Il piatto più proteico del ricettario con 52g di proteine. La tasca di pollo ripiena è un classico della cucina italiana fit. Fonte: fitwithfun.it/15-ricette-fit-e-light-con-il-pollo"},
{id:422,ing:"pollo",name:"Spiedini di Tacchino e Verdure",emoji:"🍢",diff:1,time:20,serv:1,kcal:315,p:46,c:11,f:10,goal:"definizione",goalTxt:"Spiedini colorati e proteici — ottimi anche alla griglia",items:[{i:"Petto di tacchino",q:"180g (crudo)",s:"Pollo"},{i:"Zucchine",q:"80g",s:null},{i:"Peperone",q:"80g",s:null},{i:"Melanzane",q:"60g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Stuzzicadenti per spiedini",q:"4-5",s:null}],steps:["Taglia tacchino e verdure a cubetti di circa 2 cm.","Alterna pezzi di tacchino e verdure sugli spiedini.","Condisci con olio, sale, pepe e origano.","Cuoci su piastra o padella griglia 4-5 min per lato finché il tacchino è cotto e le verdure ammorbidite."],tips:"Cottura sulla griglia in estate, in padella griglia il resto dell'anno. Tacchino = la carne più magra in assoluto (1% grassi). Si preparano in anticipo e si grigliano al momento. Fonte: melarossa.it + tradizione italiana"},
{id:423,ing:"vegetale",name:"Uova alla Coque con Asparagi",emoji:"🥚",diff:1,time:15,serv:1,kcal:425,p:30,c:27,f:24,goal:"energia",goalTxt:"Cena primaverile elegante — proteine + asparagi",items:[{i:"Uova",q:"3",s:null},{i:"Asparagi freschi",q:"150g",s:null},{i:"Parmigiano",q:"8g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Pane integrale",q:"40g (1 fetta)",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Pulisci gli asparagi, taglia la parte legnosa. Lessali in acqua bollente salata 5-7 min.","Porta a bollore acqua. Immergi le uova e cuoci 5 min esatti per il tuorlo morbido.","Scola gli asparagi e condisci con olio, sale, pepe e parmigiano grattugiato.","Disponi le uova sgusciate sopra gli asparagi. Tosta il pane integrale."],tips:"L'uovo alla coque ha il tuorlo liquido — ideale per intingere gli asparagi. Cena primaverile elegante e proteica. Fonte: cucchiaio.it/fotogallery/ricette-proteiche"},
{id:424,ing:"vegetale",name:"Uova Strapazzate con Pomodoro e Basilico",emoji:"🍅",diff:1,time:10,serv:1,kcal:425,p:25,c:36,f:22,goal:"energia",goalTxt:"Comfort food rapido — semplice e bilanciato",items:[{i:"Uova",q:"3",s:null},{i:"Pomodoro maturo",q:"150g (1 grande)",s:null},{i:"Pane integrale",q:"60g (2 fette)",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Basilico fresco",q:"q.b.",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Taglia il pomodoro a cubetti.","Padella con olio + aglio schiacciato. Pomodoro 3-4 min finché si ammorbidisce.","Sbatti le uova con sale e pepe. Versa nella padella. Strapazza dolcemente 2 min.","Spegni quando ancora morbide. Basilico fresco a fine cottura. Servi con pane tostato."],tips:"Versione italiana delle scrambled eggs — pomodoro e basilico al posto del classico burro. 10 min, comfort food serale. Fonte: mulinobianco.it/gazzetta/colazione/idee + tradizione italiana"},
{id:425,ing:"vegetale",name:"Tofu alla Piastra con Verdure Saltate",emoji:"🥢",diff:2,time:20,serv:1,kcal:280,p:21,c:15,f:17,goal:"definizione",goalTxt:"Alternativa vegetale leggera — 21g proteine vegetali",items:[{i:"Tofu al naturale",q:"180g",s:"Tempeh"},{i:"Broccoli",q:"150g",s:"Cavolfiore"},{i:"Peperone",q:"80g",s:null},{i:"Salsa di soia",q:"10ml",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Semi di sesamo",q:"q.b.",s:null}],steps:["Asciuga bene il tofu con carta. Taglialo a fette di 1 cm.","Marina il tofu 5 min con salsa di soia e aglio schiacciato.","Piastra calda: cuoci il tofu 3 min per lato finché dorato.","Stessa padella: salta broccoli a cimette e peperone 5-6 min. Servi il tofu con verdure e semi di sesamo."],tips:"Il tofu è un'eccellente fonte di proteine vegetali (8g/100g). Adatto a chi alterna proteine animali e vegetali. La marinatura nella salsa di soia ne esalta il sapore. Fonte: melarossa.it/nutrizione/mangiare-sano/ricette-tofu-seitan-tempeh"},
{id:426,ing:"vegetale",name:"Seitan alla Pizzaiola",emoji:"🍅",diff:1,time:20,serv:1,kcal:315,p:40,c:15,f:11,goal:"massa",goalTxt:"40g proteine vegetali — la 'bistecca' della tradizione",items:[{i:"Seitan",q:"150g",s:"Tempeh"},{i:"Passata di pomodoro",q:"150g",s:null},{i:"Olive nere",q:"15g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Capperi (opzionali)",q:"5g",s:null}],steps:["Taglia il seitan a fette di 1 cm.","Padella con olio + aglio. Soffriggi 1 min.","Aggiungi la passata di pomodoro, origano e capperi. 5 min a fuoco lento.","Aggiungi il seitan e le olive. Cuoci 5-6 min coperto, girando le fette a metà."],tips:"Il seitan ha 25g proteine/100g — il più proteico tra i sostituti vegetali della carne. Alla pizzaiola è un piatto della tradizione italiana adattato in versione vegana. ATTENZIONE: contiene glutine, non adatto a celiaci. Fonte: riza.it/dieta-e-salute/tofu-e-seitan + tradizione italiana"},
{id:427,ing:"vegetale",name:"Polpette di Ceci al Forno",emoji:"🧆",diff:2,time:35,serv:2,kcal:555,p:34,c:59,f:22,goal:"energia",goalTxt:"Polpette vegetali al forno — meal prep proteico",items:[{i:"Ceci in scatola",q:"250g (scolati)",s:null},{i:"Farina d'avena",q:"30g",s:"Pangrattato"},{i:"Uovo",q:"1",s:null},{i:"Parmigiano",q:"15g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Cumino",q:"q.b.",s:null},{i:"Olio EVO",q:"5ml",s:null},{i:"Rucola",q:"40g",s:null},{i:"Pomodorini",q:"60g",s:null}],steps:["Forno 200°C. Frulla i ceci con uovo, aglio, cumino, parmigiano, sale e pepe.","Aggiungi la farina d'avena per dare consistenza. Riposo 10 min in frigo.","Forma 8-10 polpette con le mani umide. Disponile su teglia con carta forno.","Inforna 20-25 min girando a metà. Servi con rucola, pomodorini, olio."],tips:"Polpette vegetali ricche di proteine e fibre. 8-10 polpette = 2 cene complete. Si congelano cotte (1 mese) e si scongelano in microonde. Fonte: cucchiaio.it/fotogallery/ricette-proteiche + selenella.it/dieta-vegetariana-proteica"},
{id:428,ing:"nocook",name:"Carpaccio di Manzo con Rucola e Grana",emoji:"🥩",diff:1,time:5,serv:1,kcal:315,p:34,c:2,f:19,goal:"definizione",goalTxt:"5 minuti — eleganza italiana zero cottura",items:[{i:"Carpaccio di manzo",q:"120g",s:"Bresaola della Valtellina"},{i:"Rucola",q:"40g",s:"Spinacino"},{i:"Parmigiano scaglie",q:"20g",s:"Grana"},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Pepe nero",q:"q.b.",s:null}],steps:["Disponi il carpaccio su un piatto piano.","Sopra metti la rucola e le scaglie di parmigiano col pelapatate.","Condisci con olio EVO, succo di limone, pepe nero."],tips:"Cena 5 minuti totalmente no-cook. Il carpaccio di manzo è una proteina magra eccellente — fai congelare 24h prima per sicurezza. Bresaola = alternativa più magra (2% grassi). Fonte: tradizione italiana + Cucchiaio d'Argento"},
{id:429,ing:"nocook",name:"Prosciutto e Melone con Mozzarella",emoji:"🍈",diff:1,time:5,serv:1,kcal:410,p:32,c:16,f:24,goal:"energia",goalTxt:"Classico estivo italiano arricchito con mozzarella",items:[{i:"Prosciutto crudo di Parma",q:"60g",s:"Speck"},{i:"Melone",q:"200g",s:"Fichi"},{i:"Mozzarella fior di latte",q:"80g",s:"Mozzarella di bufala"},{i:"Rucola",q:"20g",s:null},{i:"Pepe nero",q:"q.b.",s:null}],steps:["Taglia il melone a fettine e rimuovi la buccia.","Avvolgi ogni fettina con una fetta di prosciutto crudo.","Disponi sul piatto con la mozzarella tagliata a fette e qualche foglia di rucola.","Pepe nero macinato. Servi immediatamente."],tips:"Il classico antipasto italiano elevato a cena completa con l'aggiunta della mozzarella. Estivo, fresco, no-cook. Il dolce del melone si sposa col salato del prosciutto. Fonte: tradizione italiana storica"},
{id:430,ing:"zuppe",name:"Vellutata di Ceci e Zucca",emoji:"🥣",diff:2,time:30,serv:2,kcal:400,p:18,c:47,f:17,goal:"energia",goalTxt:"Vellutata cremosa e nutriente — comfort food invernale",items:[{i:"Ceci in scatola",q:"150g (scolati)",s:null},{i:"Zucca",q:"250g",s:"Zucca mantovana"},{i:"Cipolla",q:"30g (½)",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Parmigiano",q:"10g",s:null},{i:"Pane integrale",q:"30g (1 fetta tostata)",s:null},{i:"Rosmarino",q:"q.b.",s:null},{i:"Sale e pepe",q:"q.b.",s:null}],steps:["Pulisci la zucca e tagliala a cubetti. Trita la cipolla.","Soffriggi la cipolla in olio 3 min. Aggiungi zucca e rosmarino. 5 min.","Aggiungi ceci scolati e 400ml acqua. Cuoci 18-20 min finché la zucca è morbidissima.","Frulla tutto fino a vellutata liscia. Aggiusta di sale. Servi con parmigiano e crostini di pane integrale tostato."],tips:"Comfort food invernale che combina cereali integrali (pane) + legumi (ceci) per proteine vegetali complete. La zucca aggiunge betacarotene e fibre. Si conserva 3 giorni in frigo, anzi migliora insaporendosi. Fonte: selenella.it/il-blog-di-selenella/dieta-vegetariana-proteica"},
];

const ALL_R=[...R,...RS,...RP,...RPW,...RC];
const findRecipe=id=>ALL_R.find(r=>r.id===id);

const MacroBar=({label,value,max,color,unit})=>React.createElement('div',{style:{marginBottom:5}},React.createElement('div',{style:{display:"flex",justifyContent:"space-between",fontSize:11,color:C.textLight,marginBottom:2}},React.createElement('span',null,label),React.createElement('span',{style:{color,fontWeight:600}},value,unit)),React.createElement('div',{style:{background:C.light,borderRadius:6,height:7,overflow:"hidden"}},React.createElement('div',{style:{width:Math.min(value/max*100,100)+"%",height:"100%",background:color,borderRadius:6}})));

const MealGenerator=({onClose,onGoToRecipe})=>{
const[mode,setMode]=useState('day');
const[generated,setGenerated]=useState(null);
const[goalFilter,setGoalFilter]=useState('all');
const[locked,setLocked]=useState({});
const[expandedDay,setExpandedDay]=useState(0);
const pickRandom=(arr)=>arr[Math.floor(Math.random()*arr.length)];
const filterByGoal=(arr,g)=>g==='all'?arr:arr.filter(r=>r.goal===g);
const generateDay=prev=>{
const lk=prev?locked:{};
const col=lk.colazioni||pickRandom(filterByGoal(R,goalFilter).length?filterByGoal(R,goalFilter):R);
const snk=lk.snack||pickRandom(RS);
