const R=[
{id:1,ing:"pancakes",name:"Frittelle Proteiche Classiche",emoji:"🥞",diff:1,time:12,serv:2,kcal:370,p:32,c:36,f:10,goal:"massa",goalTxt:"Alta proteina + carb per costruire massa",items:[{i:"Fiocchi d'avena",q:"80g",s:"Farina d'avena"},{i:"Albumi d'uovo",q:"150g (5)",s:"2 uova intere"},{i:"Banana matura",q:"1 media",s:"60g purea di mela"},{i:PP,q:"30g",s:null},{i:"Lievito",q:"4g",s:null},{i:"Cannella",q:"un pizzico",s:null}],steps:["Frulla i fiocchi d'avena 15-20 sec. Aggiungi albumi, banana, proteine, lievito e cannella.","Frulla 30-40 sec fino a pastella liscia. Se troppo densa aggiungi un goccio di latte.","Scalda padella antiaderente a fuoco medio-basso con olio spray.","Versa ~60ml per frittella. Cuoci 2 min, gira quando vedi le bollicine. Cuoci 1-2 min l'altro lato.","Ripeti — otterrai ~6 frittelle. Servi con frutti di bosco e miele italiano."],tips:"Meal Prep: prepara il doppio, conserva 2 giorni in frigo. Riscalda in padella o microonde 30 sec."},
{id:2,ing:"pancakes",name:"Frittelle Cacao & Banana",emoji:"🍫",diff:1,time:12,serv:2,kcal:395,p:34,c:40,f:11,goal:"massa",goalTxt:"Comfort food proteico per volume",items:[{i:"Fiocchi d'avena",q:"80g",s:"Farina integrale"},{i:"Albumi",q:"120g (4)",s:null},{i:"Uovo intero",q:"1",s:null},{i:"Banana matura",q:"1 media",s:null},{i:"Cacao amaro",q:"12g",s:null},{i:PP,q:"30g",s:null},{i:"Lievito",q:"4g",s:null}],steps:["Frulla avena in farina. Aggiungi albumi, uovo, banana, cacao, proteine e lievito.","Frulla 30-40 sec fino a pastella cioccolatosa. Banana ben matura = più dolce.","Padella antiaderente a fuoco medio-basso con olio spray. ~60ml per frittella.","Cuoci 2 min, gira alle bollicine, cuoci 1,5 min.","Servi con yogurt greco 0%, scaglie di fondente e banana fresca."],tips:"Banana BEN matura = più dolce, zero zucchero aggiunto. Congelabili 2 settimane."},
{id:3,ing:"pancakes",name:"Crepes Proteiche Salate",emoji:"🧀",diff:2,time:15,serv:2,kcal:340,p:36,c:18,f:14,goal:"definizione",goalTxt:"Low carb, high protein — definizione",items:[{i:"Albumi",q:"200g (6-7)",s:null},{i:"Uovo intero",q:"1",s:null},{i:"Farina integrale",q:"30g",s:"Farina d'avena"},{i:"Latte scremato",q:"50ml",s:null},{i:"Prosciutto cotto",q:"60g",s:"Bresaola"},{i:"Ricotta",q:"40g",s:"Stracchino light"},{i:"Rucola",q:"30g",s:"Spinacino"}],steps:["Sbatti albumi, uovo, farina e latte. Pastella MOLTO liquida.","Padella larga (24-26 cm) a fuoco medio con olio spray.","Versa un mestolo e ruota la padella per strato sottile uniforme.","Cuoci 1,5 min, gira e cuoci 1 min. Ripeti per 3-4 crepes.","Farcisci con ricotta, prosciutto e rucola. Piega e servi."],tips:"La pastella deve essere MOLTO liquida — segreto per crepes sottili. Versione italiana: usa stracchino e bresaola."},
{id:4,ing:"pancakes",name:"Pane Dorato Proteico",emoji:"🍞",diff:1,time:10,serv:1,kcal:380,p:35,c:38,f:9,goal:"massa",goalTxt:"Il pane dorato della nonna — versione fit",items:[{i:"Pane casereccio raffermo",q:"3 fette",s:"Pane integrale"},{i:"Albumi",q:"120g (4)",s:null},{i:PP,q:"20g",s:null},{i:"Cannella",q:"2g",s:null},{i:"Latte scremato",q:"40ml",s:null},{i:"Frutti di bosco",q:"80g",s:"Fragole"}],steps:["Sbatti albumi, proteine, latte e cannella. Niente grumi.","Immergi ogni fetta 10 sec per lato, premendo con forchetta.","Padella a fuoco medio con olio EVO spray. Cuoci 2 min per lato fino a doratura.","Servi con frutti di bosco e miele millefiori."],tips:"Pane raffermo assorbe meglio senza sfaldarsi. Il pane toscano senza sale è perfetto!"},
{id:5,ing:"pancakes",name:"Ciambellone Fit alle Mele",emoji:"🍎",diff:2,time:30,serv:8,kcal:185,p:14,c:22,f:6,goal:"energia",goalTxt:"8 fette — colazione per 4 giorni",items:[{i:"Fiocchi d'avena",q:"150g",s:null},{i:"Mele",q:"2 (300g)",s:"Pere"},{i:"Uova",q:"2",s:null},{i:"Yogurt greco 0%",q:"150g",s:null},{i:PP,q:"40g",s:null},{i:"Lievito",q:"6g",s:null},{i:"Cannella",q:"3g",s:null},{i:"Miele",q:"30g",s:null}],steps:["Forno 170°C. Fodera stampo ciambella 24 cm con olio spray.","Frulla avena in farina. Grattugia 1 mela, taglia l'altra a fettine.","Mescola farina avena, uova, yogurt, proteine, miele, cannella e mela grattugiata.","Versa nello stampo. Fettine di mela sopra. Inforna 25-28 min.","Stecchino pulito = pronto. Taglia in 8 fette."],tips:"Dolce della tradizione italiana in versione fit. 4 giorni in frigo, congelabile a fette. Zero zucchero raffinato!"},
{id:6,ing:"oats",name:"Overnight Oats Classici",emoji:"🥣",diff:1,time:5,serv:1,kcal:420,p:30,c:52,f:12,goal:"energia",goalTxt:"Prepara la sera, mangia al mattino",items:[{i:"Fiocchi d'avena",q:"60g",s:"Fiocchi farro"},{i:"Yogurt greco 0%",q:"150g",s:null},{i:"Latte scremato",q:"80ml",s:null},{i:"Semi di chia",q:"10g",s:"Semi lino"},{i:"Miele millefiori",q:"10g",s:null},{i:"Frutti di bosco",q:"80g",s:null},{i:"Mandorle lamelle",q:"10g",s:null}],steps:["In un barattolo: avena, yogurt, latte, chia e miele. Agita bene.","Frigo per almeno 6 ore (ideale tutta la notte).","Al mattino aggiungi frutti di bosco e mandorle."],tips:"MEAL PREP: 5 barattoli la domenica = colazione per tutta la settimana. 5 giorni in frigo."},
{id:7,ing:"oats",name:"Overnight Oats al Tiramisù",emoji:"☕",diff:1,time:5,serv:1,kcal:400,p:32,c:48,f:10,goal:"energia",goalTxt:"Il tiramisù fit da mangiare ogni mattina",items:[{i:"Fiocchi d'avena",q:"60g",s:null},{i:"Yogurt greco 0%",q:"130g",s:null},{i:"Caffè freddo",q:"40ml",s:null},{i:"Cacao amaro",q:"8g",s:null},{i:PP,q:"20g",s:null},{i:"Miele",q:"10g",s:null}],steps:["Prepara espresso con moka e lascia raffreddare COMPLETAMENTE.","In barattolo: avena, yogurt, caffè freddo, cacao, proteine e miele. Mescola.","Frigo 6+ ore. Al mattino spolvera cacao. +20g mascarpone = premium."],tips:"Con +20g mascarpone la texture diventa incredibilmente simile al tiramisù. Caffè della moka = sapore italiano autentico."},
{id:8,ing:"oats",name:"Baked Oats al Cacao",emoji:"🍫",diff:1,time:25,serv:1,kcal:410,p:33,c:48,f:10,goal:"massa",goalTxt:"Sembra un brownie — 33g proteine",items:[{i:"Fiocchi d'avena",q:"60g",s:null},{i:"Banana matura",q:"1 media",s:null},{i:"Uovo intero",q:"1",s:null},{i:PP,q:"30g",s:null},{i:"Cacao amaro",q:"10g",s:null},{i:"Lievito",q:"4g",s:null},{i:"Latte scremato",q:"60ml",s:null},{i:"Nocciole tritate",q:"10g",s:null}],steps:["Preriscalda forno 180°C. Ungi ramekin con olio spray.","Frulla tutto TRANNE nocciole per 30-40 sec.","Versa nel ramekin, nocciole sopra.","Inforna 20-22 min. Stecchino deve uscire umido non liquido. Riposa 5 min."],tips:"VERSIONE VELOCE: stesso impasto in tazza, microonde 3 min. Nocciole italiane = sapore superiore."},
{id:9,ing:"oats",name:"Porridge Proteico",emoji:"🔥",diff:1,time:8,serv:1,kcal:430,p:35,c:50,f:12,goal:"energia",goalTxt:"Colazione calda — energia pura",items:[{i:"Fiocchi d'avena",q:"60g",s:"Fiocchi d'orzo"},{i:"Latte scremato",q:"200ml",s:null},{i:PP,q:"30g",s:null},{i:"Banana",q:"½",s:"Fichi freschi 2"},{i:"Crema di mandorle",q:"12g",s:"Crema nocciole fit"},{i:"Cannella",q:"2g",s:null}],steps:["Porta latte quasi a bollore. Aggiungi avena e cuoci 4-5 min mescolando.","TOGLI DAL FUOCO, aspetta 2 min che si intiepidisca.","Aggiungi proteine e mescola vigorosamente 20-30 sec.","Completa con banana, crema di mandorle e cannella."],tips:"MAI proteine nel liquido bollente = grumi garantiti. Aspetta sempre. Con fichi freschi d'estate = versione mediterranea top."},
{id:10,ing:"uova",name:"Uova Strapazzate Cremose",emoji:"🍳",diff:1,time:8,serv:1,kcal:310,p:34,c:4,f:18,goal:"definizione",goalTxt:"Ultra low-carb — re della definizione",items:[{i:"Uova intere",q:"2",s:null},{i:"Albumi",q:"120g (4)",s:null},{i:"Latte scremato",q:"20ml",s:null},{i:"Erba cipollina",q:"5g",s:"Prezzemolo"},{i:"Sale e pepe",q:"q.b.",s:null},{i:"Olio EVO",q:"5ml",s:null}],steps:["Sbatti uova, albumi e latte con forchetta. Pizzico di sale e pepe.","Olio EVO in padella a fuoco MEDIO-BASSO.","Versa uova. Aspetta 20 sec. Con spatola spingi dal bordo al centro ogni 15-20 sec.","Togli dal fuoco quando ANCORA leggermente umide. Cospargi erba cipollina."],tips:"Fuoco BASSO e togliere PRIMA che sembrino pronte = cremose. Servile su pane casereccio tostato con pomodorini."},
{id:11,ing:"uova",name:"Frittatine alle Verdure",emoji:"🧁",diff:1,time:25,serv:6,kcal:120,p:14,c:3,f:6,goal:"definizione",goalTxt:"6 colazioni in 25 min — meal prep",items:[{i:"Uova intere",q:"4",s:null},{i:"Albumi",q:"200g",s:null},{i:"Peperoni misti",q:"100g",s:"Zucchine"},{i:"Spinacini",q:"60g",s:null},{i:"Pomodorini",q:"80g",s:null},{i:"Parmigiano",q:"30g",s:"Pecorino"},{i:"Origano, sale, pepe",q:"q.b.",s:null}],steps:["Forno 180°C. Prepara teglia da muffin con 6 pirottini.","Taglia verdure a cubetti piccoli (5mm).","Sbatti uova e albumi con parmigiano, sale, pepe e origano.","Distribuisci verdure nei 6 stampini. Versa uova.","Inforna 18-20 min. Raffredda 5 min."],tips:"5 giorni in frigo, 1 mese in freezer. Microonde 40-60 sec per riscaldare. Il parmigiano dà sapore senza aggiungere troppi grassi."},
{id:12,ing:"uova",name:"Uova in Purgatorio",emoji:"🍅",diff:2,time:18,serv:2,kcal:320,p:26,c:18,f:16,goal:"energia",goalTxt:"Uova nel sugo — tradizione napoletana",items:[{i:"Uova intere",q:"4",s:null},{i:"Polpa pomodoro",q:"400g",s:null},{i:"Peperone rosso",q:"1",s:null},{i:"Cipolla",q:"½",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Peperoncino",q:"q.b.",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Basilico",q:"q.b.",s:null}],steps:["Taglia cipolla a dadini, peperone a cubetti 1 cm, trita aglio.","Soffriggi cipolla e peperone 5 min in olio EVO.","Aggiungi aglio, peperoncino. 1 min mescolando.","Versa polpa pomodoro, cuoci 5-6 min senza coperchio. Basilico.","Crea 4 incavi, rompi 1 uovo in ognuno. Coperchio, 6-8 min."],tips:"Ricetta della tradizione campana. Per MASSA: +2 fette pane casereccio tostato + 100g fagioli nel sugo. Parmigiano grattugiato a fine cottura."},
{id:13,ing:"uova",name:"Frittata Arrotolata",emoji:"🌯",diff:2,time:10,serv:1,kcal:340,p:38,c:6,f:18,goal:"definizione",goalTxt:"Zero carb — frittata diventa wrap",items:[{i:"Uova intere",q:"2",s:null},{i:"Albumi",q:"80g (3)",s:null},{i:"Prosciutto crudo",q:"40g",s:"Bresaola"},{i:"Ricotta",q:"40g",s:null},{i:"Pomodoro",q:"½",s:null},{i:"Rucola",q:"20g",s:null}],steps:["Sbatti uova e albumi con sale e pepe.","Padella LARGA (26 cm) a fuoco medio. Versa e distribuisci sottile.","Cuoci 2-3 min, gira e cuoci 1 min.","Farcisci con ricotta, prosciutto crudo, pomodoro e rucola. Arrotola."],tips:"Padella LARGA = frittata sottile = si arrotola facilmente. Prosciutto crudo e ricotta = combo italiana perfetta."},
{id:14,ing:"yogurt",name:"Yogurt Greco con Miele e Noci",emoji:"🍯",diff:1,time:3,serv:1,kcal:380,p:34,c:42,f:12,goal:"energia",goalTxt:"3 minuti — la più veloce del Mediterraneo",items:[{i:"Yogurt greco 0%",q:"250g",s:null},{i:PP,q:"20g",s:null},{i:"Miele millefiori",q:"15g",s:null},{i:"Noci",q:"15g",s:"Mandorle"},{i:"Fichi secchi",q:"2 (20g)",s:"Datteri 2"}],steps:["Yogurt + proteine in ciotola. Mescola vigorosamente 20-30 sec.","Noci spezzate e fichi a pezzetti sopra.","Miele a filo."],tips:"Yogurt greco+miele+noci = la colazione degli atleti greci da 3000 anni. Fichi secchi = potassio e ferro naturale."},
{id:15,ing:"yogurt",name:"Ricotta con Frutta e Pistacchi",emoji:"🫐",diff:1,time:5,serv:1,kcal:350,p:28,c:36,f:14,goal:"energia",goalTxt:"La crema del Mediterraneo — dolce naturale",items:[{i:"Ricotta vaccina",q:"200g",s:"Ricotta di pecora"},{i:"Frutti di bosco",q:"100g",s:"Fragole"},{i:"Pistacchi sgusciati",q:"15g",s:null},{i:"Miele",q:"15g",s:null},{i:"Cannella",q:"un pizzico",s:null},{i:"Scorza limone",q:"q.b.",s:null}],steps:["Monta la ricotta con miele e cannella fino a crema soffice.","Frutti di bosco sopra.","Pistacchi tritati e scorza di limone."],tips:"La ricotta italiana ha 11g proteine per 100g e texture unica. Con ricotta di pecora = versione premium. I pistacchi di Bronte sono il top!"},
{id:16,ing:"yogurt",name:"Yogurt Bark Proteico",emoji:"🍦",diff:1,time:10,serv:4,kcal:180,p:18,c:20,f:4,goal:"definizione",goalTxt:"Snack da freezer — barretta gelato",items:[{i:"Yogurt greco 0%",q:"400g",s:null},{i:PP,q:"40g",s:null},{i:"Miele",q:"20g",s:null},{i:"Frutti di bosco",q:"100g",s:null},{i:"Mandorle lamelle",q:"20g",s:null},{i:"Pistacchi tritati",q:"10g",s:null},{i:"Cioccolato fondente",q:"15g",s:null}],steps:["Mescola yogurt, proteine e miele fino a crema liscia.","Stendi su teglia con carta forno (~1 cm spessore).","Aggiungi topping premendo leggermente.","Freezer 4+ ore. Spezza in pezzi irregolari."],tips:"Freezer fino a 1 MESE. Tira fuori 2-3 min prima. Perfetto d'estate. Mandorle e pistacchi italiani = superfood mediterraneo."},

{id:403,ing:"pesce",name:"Gamberetti Aglio e Prezzemolo",emoji:"🦐",diff:1,time:12,serv:1,kcal:260,p:32,c:10,f:10,goal:"definizione",goalTxt:"12 minuti — leggero e proteico",items:[{i:"Gamberetti sgusciati",q:"200g",s:"Mazzancolle"},{i:"Zucchine",q:"200g",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Prezzemolo",q:"q.b.",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Peperoncino",q:"q.b.",s:null},{i:"Limone",q:"½",s:null}],steps:["Se surgelati: scongela in acqua FREDDA 5 min. Asciuga BENE.","Zucchine a dadini 1 cm. Padella alta con olio+aglio: zucchine 4 min.","Aggiungi gamberetti. Fuoco ALTO 2 min per lato. Peperoncino.","Prezzemolo abbondante, limone, pepe. Servi subito."],tips:"Gamberetti: 24g proteine, 1g grassi per 100g. Aglio+prezzemolo = la combo della cucina di mare italiana."},
{id:404,ing:"pesce",name:"Orata al Cartoccio",emoji:"🐟",diff:1,time:25,serv:1,kcal:320,p:38,c:6,f:16,goal:"recovery",goalTxt:"Pesce mediterraneo — cottura perfetta",items:[{i:"Filetto orata",q:"200g",s:"Filetto spigola"},{i:"Pomodorini",q:"100g",s:null},{i:"Olive taggiasche",q:"20g",s:null},{i:"Capperi",q:"8g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Origano",q:"q.b.",s:null}],steps:["Forno 200°C. Stendi foglio alluminio grande.","Orata al centro. Pomodorini, olive, capperi sopra. Olio, limone, origano.","Chiudi il cartoccio a pacchetto ben sigillato.","Inforna 18-20 min. Apri al tavolo per il profumo."],tips:"Il cartoccio mantiene tutta l'umidità e i sapori. Orata e spigola sono pesci mediterranei per eccellenza. Zero sporco, zero fatica."},
{id:405,ing:"pollo",name:"Petto di Pollo e Broccoli",emoji:"🍗",diff:1,time:18,serv:1,kcal:360,p:42,c:14,f:14,goal:"massa",goalTxt:"Il classico — mai fuori moda",items:[{i:"Petto pollo",q:"180g",s:"Tacchino"},{i:"Broccoli",q:"200g",s:"Cavolfiore"},{i:"Aglio",q:"1 spicchio",s:null},{i:"Paprika",q:"3g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Peperoncino",q:"q.b.",s:null}],steps:["Batti il pollo a spessore uniforme (~1,5 cm). Condisci con paprika, sale, pepe.","Padella CALDA con olio: 4-5 min per lato SENZA muovere. Riposo 3 min.","Broccoli a cimette. Stessa padella con aglio: 5 min con coperchio.","Componi: broccoli, pollo a fette, limone e peperoncino."],tips:"BATTERE il pollo = cottura uniforme = mai secco. Riposo 3 min = succosità. MEAL PREP: griglia 500g la domenica."},
{id:406,ing:"pollo",name:"Pollo alla Cacciatora Light",emoji:"🍗",diff:2,time:25,serv:2,kcal:350,p:38,c:14,f:14,goal:"massa",goalTxt:"Tradizione toscana — sapore intenso",items:[{i:"Petto pollo",q:"300g",s:null},{i:"Polpa pomodoro",q:"200g",s:null},{i:"Cipolla",q:"1",s:null},{i:"Peperone",q:"1",s:null},{i:"Olive nere",q:"30g",s:null},{i:"Capperi",q:"10g",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Rosmarino",q:"1 rametto",s:null}],steps:["Pollo a bocconcini 3 cm. Rosola in padella calda con olio 4 min.","Aggiungi cipolla a fette, peperone a listarelle. 4 min.","Aglio, rosmarino, pomodoro, olive, capperi. Mescola.","Copri e cuoci 12-15 min a fuoco basso. Deve addensarsi."],tips:"Il pollo alla cacciatora è un grande classico toscano. Olive e capperi danno profondità senza aggiungere calorie. Perfetto anche il giorno dopo."},
{id:407,ing:"pollo",name:"Straccetti Tacchino e Peperoni",emoji:"🌶️",diff:1,time:15,serv:1,kcal:310,p:40,c:12,f:10,goal:"definizione",goalTxt:"Magro e colorato — definizione facile",items:[{i:"Petto tacchino",q:"180g",s:"Pollo"},{i:"Peperoni misti",q:"200g",s:null},{i:"Cipolla rossa",q:"½",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Aceto balsamico",q:"5ml",s:null}],steps:["Tacchino a striscioline. Peperoni a listarelle, cipolla a fette.","Padella ALTA con olio: tacchino 3-4 min a fuoco alto. Togli.","Stessa padella: peperoni+cipolla 5 min. Rimetti tacchino.","Origano, balsamico di Modena, sale e pepe. 1 min."],tips:"Il tacchino ha solo 1% di grassi — la carne più magra. Aceto balsamico di Modena = sapore italiano autentico."},
{id:408,ing:"pollo",name:"Pollo alla Mediterranea",emoji:"🫒",diff:2,time:20,serv:1,kcal:380,p:40,c:12,f:18,goal:"massa",goalTxt:"Sapori del Sud — pollo con olive e pomodori",items:[{i:"Petto pollo",q:"170g",s:null},{i:"Pomodorini",q:"150g",s:null},{i:"Olive taggiasche",q:"30g",s:null},{i:"Capperi",q:"10g",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Basilico",q:"q.b.",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Origano",q:"q.b.",s:null}],steps:["Pollo a fette condito con origano, sale, pepe.","Padella calda con olio: pollo 3 min per lato. Togli.","Aglio 30 sec. Pomodorini schiacciati 4-5 min. Olive e capperi.","Rimetti pollo nel sugo. 2 min. Basilico fresco."],tips:"Pomodorini+olive+capperi = il tris della cucina costiera italiana. Zero ingredienti esotici, massimo sapore."},
{id:409,ing:"uova",name:"Frittata Proteica Serale",emoji:"🥚",diff:1,time:12,serv:1,kcal:300,p:32,c:6,f:18,goal:"definizione",goalTxt:"Low-carb serale — semplice ed efficace",items:[{i:"Uova intere",q:"2",s:null},{i:"Albumi",q:"120g (4)",s:null},{i:"Zucchine",q:"100g",s:null},{i:"Pomodorini",q:"80g",s:null},{i:"Parmigiano",q:"10g",s:null},{i:"Basilico",q:"q.b.",s:null},{i:"Olio EVO",q:"8ml",s:null}],steps:["Sbatti uova+albumi con parmigiano, sale, pepe.","Olio in padella. Zucchine a dadini 3 min. Pomodorini 1 min.","Versa uova. Cuoci 5 min fuoco basso con coperchio.","Se disponibile, gratina sotto grill 2 min. Basilico fresco."],tips:"Il mix uova intere + albumi = più proteine, meno grassi. Il parmigiano = sapore italiano senza appesantire."},
{id:410,ing:"uova",name:"Uova al Forno Mediterranee",emoji:"🍅",diff:1,time:22,serv:2,kcal:280,p:24,c:14,f:16,goal:"energia",goalTxt:"Comfort food serale — tradizione",items:[{i:"Uova intere",q:"4",s:null},{i:"Peperone",q:"1 grande",s:null},{i:"Melanzana",q:"½",s:null},{i:"Pomodorini",q:"150g",s:null},{i:"Olive nere",q:"30g",s:null},{i:"Pecorino",q:"30g",s:"Parmigiano"},{i:"Olio EVO",q:"10ml",s:null},{i:"Origano",q:"q.b.",s:null}],steps:["Forno 190°C. Peperone e melanzana a dadini 1,5 cm.","In teglia con olio: verdure condite. Inforna 10 min.","Crea 4 incavi. Rompi 1 uovo in ognuno. Olive e pecorino.","Inforna 8-10 min. Albume solido, tuorlo cremoso."],tips:"Le verdure al forno sviluppano dolcezza naturale. Il pecorino al posto della feta è la scelta 100% italiana."},
{id:411,ing:"uova",name:"Omelette Funghi e Spinaci",emoji:"🍄",diff:1,time:10,serv:1,kcal:290,p:30,c:4,f:16,goal:"definizione",goalTxt:"Ultra low-carb — definizione serale",items:[{i:"Uova intere",q:"2",s:null},{i:"Albumi",q:"100g (3)",s:null},{i:"Champignon",q:"120g",s:"Porcini"},{i:"Spinacini",q:"60g",s:null},{i:"Aglio",q:"1 spicchio",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Timo",q:"q.b.",s:null}],steps:["Champignon a fette. Padella con olio+aglio: funghi 4-5 min. Spinaci 1 min. Togli.","Sbatti uova+albumi con sale, pepe e timo.","Padella pulita, olio spray. Versa uova. 4 min fuoco basso.","Ripieno su metà. Piega. 1 min. Scivola nel piatto."],tips:"Con funghi porcini = piatto da ristorante in 10 min. I funghi a cena favoriscono il sonno grazie all'ergotioneina."},
{id:412,ing:"legumi",name:"Zuppa di Lenticchie Toscana",emoji:"🍲",diff:1,time:25,serv:2,kcal:320,p:22,c:42,f:6,goal:"energia",goalTxt:"Comfort food invernale — tradizione toscana",items:[{i:"Lenticchie rosse secche",q:"150g",s:"Lenticchie di Castelluccio"},{i:"Carote",q:"2",s:null},{i:"Cipolla",q:"1",s:null},{i:"Aglio",q:"2 spicchi",s:null},{i:"Rosmarino",q:"1 rametto",s:null},{i:"Pomodori pelati",q:"200g",s:null},{i:"Brodo vegetale",q:"600ml",s:null},{i:"Olio EVO",q:"10ml",s:null}],steps:["Cipolla+carote a dadini in olio 4 min. Aglio+rosmarino 1 min.","Lenticchie sciacquate + pomodori + brodo. Porta a bollore.","Cuoci 15-18 min coperto a fuoco basso. Lenticchie rosse si disfano.","Frulla metà e rimescola per zuppa cremosa. Olio a crudo abbondante."],tips:"Le lenticchie rosse NON vanno in ammollo e cuociono in 15 min. Rosmarino = l'erba aromatica toscana per eccellenza. Porzioni per 2 sere!"},
{id:413,ing:"legumi",name:"Ceci e Spinaci in Padella",emoji:"🫘",diff:1,time:12,serv:1,kcal:340,p:20,c:38,f:12,goal:"energia",goalTxt:"Vegetale, veloce, saziante",items:[{i:"Ceci scatola",q:"250g scolati",s:null},{i:"Spinaci freschi",q:"120g",s:"Bietola"},{i:"Aglio",q:"2 spicchi",s:null},{i:"Pomodorini",q:"100g",s:null},{i:"Peperoncino",q:"q.b.",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null}],steps:["Asciuga ceci. Padella con olio+aglio: ceci 4-5 min schiacciandone alcuni.","Pomodorini a metà, peperoncino. 3 min.","Spinaci a manate. Coperchio 2 min per appassire.","Limone, pepe, olio a crudo."],tips:"Schiaccia ALCUNI ceci con la forchetta = crema naturale che lega tutto. +1 uovo in camicia sopra = 26g proteine."},
{id:414,ing:"legumi",name:"Polpette di Lenticchie al Forno",emoji:"🫘",diff:2,time:30,serv:4,kcal:195,p:14,c:26,f:4,goal:"energia",goalTxt:"8 polpette — meal prep vegetale",items:[{i:"Lenticchie scatola",q:"400g scolate",s:null},{i:"Pangrattato",q:"40g",s:null},{i:"Carota",q:"1",s:null},{i:"Cipolla",q:"½",s:null},{i:"Parmigiano",q:"20g",s:null},{i:"Uovo",q:"1",s:null},{i:"Prezzemolo",q:"q.b.",s:null}],steps:["Schiaccia lenticchie con forchetta lasciando pezzi. Carota grattugiata, cipolla tritata.","Mescola: lenticchie, pangrattato, carota, cipolla, uovo, parmigiano, prezzemolo.","Forma 8 polpette. Frigo 15 min.","Forno 200°C su teglia con carta forno: 20 min girando a metà."],tips:"Polpette = tradizione italiana. Al forno = meno grassi della padella. 4 giorni in frigo, congelabili. Con sugo di pomodoro = perfette."},
{id:415,ing:"insalate",name:"Caprese Proteica",emoji:"🇮🇹",diff:1,time:5,serv:1,kcal:340,p:26,c:8,f:24,goal:"energia",goalTxt:"Tricolore italiano — semplicità assoluta",items:[{i:"Mozzarella di bufala",q:"125g",s:"Mozzarella light"},{i:"Pomodori cuore di bue",q:"200g",s:null},{i:"Basilico fresco",q:"6-8 foglie",s:null},{i:"Olio EVO",q:"12ml",s:null},{i:"Origano",q:"q.b.",s:null},{i:"Sale Maldon",q:"q.b.",s:null}],steps:["Pomodori a fette spesse 1 cm.","Mozzarella a fette, alternata ai pomodori.","Basilico, olio EVO, sale e origano."],tips:"La caprese è la perfezione della semplicità italiana. Mozzarella DOP = 18g proteine per 100g. Per definizione usa mozzarella light."},
{id:416,ing:"insalate",name:"Insalata Tiepida Pollo e Verdure",emoji:"🥗",diff:1,time:15,serv:1,kcal:380,p:38,c:12,f:18,goal:"massa",goalTxt:"Tiepida e saziante — completa",items:[{i:"Petto pollo",q:"150g",s:"Tacchino"},{i:"Rucola",q:"60g",s:null},{i:"Pomodorini",q:"100g",s:null},{i:"Olive",q:"20g",s:null},{i:"Parmigiano scaglie",q:"15g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Aceto balsamico",q:"5ml",s:null}],steps:["Pollo a fette condito con origano, sale, pepe.","Padella calda: 3-4 min per lato. Riposa 2 min. Striscioline.","Rucola base. Pomodorini, olive, parmigiano a scaglie.","Pollo CALDO sopra insalata fredda. Balsamico e olio."],tips:"Il contrasto caldo/freddo rende tutto più gustoso. Parmigiano a scaglie col pelapatate = effetto ristorante. Tutto italiano al 100%."},
{id:417,ing:"zuppe",name:"Vellutata di Zucca",emoji:"🎃",diff:1,time:25,serv:2,kcal:220,p:16,c:28,f:6,goal:"definizione",goalTxt:"Leggera e saziante — perfetta in definizione",items:[{i:"Zucca",q:"400g",s:"Zucca mantovana"},{i:"Cipolla",q:"1",s:null},{i:"Patata piccola",q:"1 (80g)",s:null},{i:"Brodo vegetale",q:"400ml",s:null},{i:"Ricotta",q:"80g",s:null},{i:"Olio EVO",q:"8ml",s:null},{i:"Noce moscata",q:"un pizzico",s:null},{i:"Semi zucca",q:"8g",s:null}],steps:["Cipolla in olio 3 min. Zucca+patata a cubetti 2 cm.","Brodo e cuoci 15-18 min coperto. Zucca morbidissima.","Frulla LISCIO. Aggiusta sale. Noce moscata.","Servi con cucchiaiata di ricotta al centro e semi di zucca."],tips:"La ricotta al posto della panna = +11g proteine, -150 kcal. La zucca mantovana è la più dolce e cremosa."},
{id:418,ing:"zuppe",name:"Minestrone della Tradizione",emoji:"🥕",diff:1,time:25,serv:2,kcal:310,p:22,c:36,f:8,goal:"energia",goalTxt:"Il piatto della nonna — arricchito",items:[{i:"Cannellini scatola",q:"200g scolati",s:"Borlotti"},{i:"Carote",q:"2",s:null},{i:"Zucchine",q:"1",s:null},{i:"Patata",q:"1 media",s:null},{i:"Pomodori pelati",q:"200g",s:null},{i:"Sedano",q:"2 coste",s:null},{i:"Parmigiano crosta",q:"1 pezzo",s:null},{i:"Olio EVO",q:"10ml",s:null}],steps:["Taglia verdure a dadini 1 cm. Soffriggi sedano+carote 3 min.","Zucchine, patata, pomodori. Acqua a coprire + crosta parmigiano.","Cuoci 18-20 min coperto. Aggiungi cannellini ultimi 3 min.","Togli crosta. Olio a crudo abbondante e parmigiano grattugiato."],tips:"La crosta di parmigiano nel brodo = UMAMI e proteine extra. Trucco della nonna! 2 porzioni = 2 cene pronte."},
{id:419,ing:"light",name:"Bresaola Rucola e Parmigiano",emoji:"🥩",diff:1,time:5,serv:1,kcal:270,p:32,c:2,f:14,goal:"definizione",goalTxt:"5 min, zero cottura — il più italiano",items:[{i:"Bresaola della Valtellina",q:"100g",s:"Carpaccio manzo"},{i:"Rucola",q:"60g",s:null},{i:"Parmigiano scaglie",q:"20g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"½",s:null},{i:"Pepe nero",q:"q.b.",s:null}],steps:["Disponi bresaola su piatto grande.","Rucola al centro. Scaglie di parmigiano con pelapatate.","Condisci con olio, limone abbondante e pepe nero."],tips:"Bresaola = 2% grassi, 33g proteine per 100g. IL salume più magro in assoluto. Con parmigiano e rucola = il piatto italiano per eccellenza."},
{id:420,ing:"light",name:"Crudo di Pesce alla Pugliese",emoji:"🐟",diff:2,time:10,serv:1,kcal:300,p:34,c:4,f:16,goal:"recovery",goalTxt:"Omega-3 puri — tradizione costiera",items:[{i:"Orata fresca abbattuta",q:"160g",s:"Branzino"},{i:"Pomodorini",q:"80g",s:null},{i:"Capperi",q:"8g",s:null},{i:"Olive taggiasche",q:"15g",s:null},{i:"Olio EVO",q:"10ml",s:null},{i:"Limone",q:"1",s:null},{i:"Prezzemolo",q:"q.b.",s:null}],steps:["Taglia orata a fettine sottilissime. Disponi su piatto freddo.","Condisci con limone abbondante, olio EVO e sale.","Pomodorini a dadini, capperi, olive tritate e prezzemolo sopra."],tips:"Usa SOLO pesce abbattuto (-20°C per 24h) per consumo crudo. Il crudo di pesce è tradizione pugliese e campana. Omega-3 intatti senza cottura."},
